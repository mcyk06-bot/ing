<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; }

#next-room-btn {

}
#memo-popup {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(240,235,220,0.97); color: #333; padding: 30px 36px;
  max-width: 380px; width: 90%; font-size: 13px; line-height: 2;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6); display: none; pointer-events: all; z-index: 30;
  border-left: 3px solid #999; font-family: 'Georgia', serif;
}
#memo-popup .close-btn { position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 20px; color: #666; }
#memo-popup h4 { font-size: 10px; letter-spacing: 0.2em; color: #999; margin-bottom: 12px; text-transform: uppercase; }
#vjoy-left, #vjoy-right {
  position: fixed; bottom: 60px; width: 120px; height: 120px; border-radius: 50%;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
  display: none; pointer-events: all; touch-action: none; z-index: 20;
}
#vjoy-left { left: 40px; }
#vjoy-right { right: 40px; }
.vjoy-knob {
  position: absolute; width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
  top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none;
}
#loading {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #000; display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.5); font-size: 13px; letter-spacing: 0.4em; z-index: 100;
}
</style>
</head>

<script>
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function init() {
  try {
    await loadScript('https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js');
    startApp();
  } catch(e) {
    document.getElementById('loading').textContent = 'LOAD ERROR: ' + e.message;
  }
}
init();

function startApp() {

const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);

const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.5;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 25, 120);
scene.background = new THREE.Color(0x050505);

const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.05, 200);
camera.position.set(0, 1.7, 0);

const keys = {};
let yaw = 0, pitch = 0;
let isPointerLocked = false;
const clock = new THREE.Clock();
const shootBeams = [];
let currentRoomGroup = null;
let currentDoors = [];
let interactables = [];
let creatures = [];
let targetCreature = null;
let roomCount = 0;
let playerHeight = 1.7;
let currentRoomDims = { W: 20, D: 20, H: 6 };
let isTransitioning = false;

const vjoy = {
  left:  { active:false, dx:0, dy:0, id:-1, startX:0, startY:0 },
  right: { active:false, dx:0, dy:0, id:-1, startX:0, startY:0 }
};

const MEMOS = [
  "今日で3回目になる。\n毎回同じドアから入るのに、\n部屋が変わっている。\n壁の色まで違う。",
  "白い部屋に白い椅子。\n誰かが座っていたような跡がある。\nでも誰もいない。ずっと。",
  "光源を探したが見つからない。\n部屋全体が等しく明るい。\n影もない。怖い。",
  "ドアの数を数えた。\n入ってきたドアが消えていた。\nもしかしてここに住むのか。",
  "床の模様が昨日と違う。\nいや、昨日ここに来たのか\n自分でもわからなくなってきた。",
  "天井が高すぎる。\n手を伸ばしても届かない。\n声を出したら吸い込まれた。",
  "窓の外が森だった。\n雨が降っていた。\nガラスをたたいたが音がしなかった。",
  "螺旋階段を上った。\n上にも同じ部屋があった。\n今度は下に行ってみる。",
  "植物が増えている気がする。\n昨日3つだったのに今日は5つ。\n水やりは誰がしているのか。",
  "時計が10:09で止まっている。\nずっと前から。\nあるいはこれが正しい時刻なのか。",
  "配管の音がする。\nでも配管は飾りのはずだ。\nではあの音は何だ。",
  "I have been here before.\nOr somewhere like this.\nThe walls remember me.",
  "出口を探すのをやめた。\nここが目的地だったのかもしれない。\n悪くない。",
];

function r(a,b){return a+Math.random()*(b-a);}
function ri(a,b){return Math.floor(r(a,b+1));}

function makeCanvas(w,h,fn){
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  fn(c.getContext('2d'),w,h);
  const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}

function makeWallTex(){
  const styles=['plaster','concrete','nordic','tile','marble'];
  const s=styles[ri(0,styles.length-1)];
  return makeCanvas(512,512,(ctx,w,h)=>{
    if(s==='plaster'){
      ctx.fillStyle=`hsl(${40+Math.random()*20},${5+Math.random()*8}%,${88+Math.random()*8}%)`;
      ctx.fillRect(0,0,w,h);
      for(let i=0;i<8000;i++){
        ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.035})`;
        ctx.beginPath(); ctx.arc(Math.random()*w,Math.random()*h,Math.random()*3,0,Math.PI*2); ctx.fill();
      }
      for(let i=0;i<40;i++){
        ctx.strokeStyle=`rgba(200,195,185,${Math.random()*0.15})`;
        ctx.lineWidth=r(1,4);
        ctx.beginPath(); ctx.moveTo(Math.random()*w,Math.random()*h);
        ctx.lineTo(Math.random()*w,Math.random()*h); ctx.stroke();
      }
    } else if(s==='concrete'){
      ctx.fillStyle=`hsl(210,${3+Math.random()*5}%,${75+Math.random()*15}%)`;
      ctx.fillRect(0,0,w,h);
      for(let i=0;i<4000;i++){
        const v=Math.random()>0.5;
        ctx.fillStyle=`rgba(${v?255:0},${v?255:0},${v?255:0},${Math.random()*0.06})`;
        ctx.fillRect(Math.random()*w,Math.random()*h,Math.random()*4+1,1);
      }
      for(let i=0;i<6;i++){
        ctx.strokeStyle=`rgba(100,100,100,${Math.random()*0.12})`;
        ctx.lineWidth=1;
        const y=Math.random()*h;
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y+Math.random()*4-2); ctx.stroke();
      }
    } else if(s==='nordic'){
      ctx.fillStyle=`hsl(35,${12+Math.random()*8}%,${90+Math.random()*6}%)`;
      ctx.fillRect(0,0,w,h);
      for(let y=0;y<h;y+=48+Math.floor(Math.random()*16)){
        ctx.strokeStyle=`rgba(180,165,150,${0.08+Math.random()*0.1})`;
        ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y+Math.random()*2-1); ctx.stroke();
      }
    } else if(s==='tile'){
      const ts=40;
      for(let y=0;y<h;y+=ts) for(let x=0;x<w;x+=ts){
        ctx.fillStyle=`hsl(0,0%,${86+Math.random()*10}%)`;
        ctx.fillRect(x+1,y+1,ts-2,ts-2);
      }
      ctx.strokeStyle='rgba(160,155,150,0.25)'; ctx.lineWidth=1.5;
      for(let y=0;y<h;y+=ts){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
      for(let x=0;x<w;x+=ts){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
    } else {
      ctx.fillStyle=`hsl(0,0%,${88+Math.random()*8}%)`;
      ctx.fillRect(0,0,w,h);
      for(let i=0;i<10;i++){
        ctx.strokeStyle=`rgba(160,155,150,${0.1+Math.random()*0.18})`;
        ctx.lineWidth=r(0.5,3);
        ctx.beginPath();
        let x=Math.random()*w,y=Math.random()*h; ctx.moveTo(x,y);
        for(let j=0;j<18;j++){x+=(Math.random()-0.5)*70;y+=(Math.random()-0.5)*25;ctx.lineTo(x,y);}
        ctx.stroke();
      }
    }
  });
}

function makeFloorTex(){
  const styles=['stone','concrete','marble','wood','terrazzo'];
  const s=styles[ri(0,styles.length-1)];
  return makeCanvas(512,512,(ctx,w,h)=>{
    if(s==='stone'){
      ctx.fillStyle=`hsl(0,0%,${20+Math.random()*15}%)`;
      ctx.fillRect(0,0,w,h);
      const ts=80+Math.floor(Math.random()*40);
      ctx.strokeStyle=`rgba(255,255,255,0.07)`; ctx.lineWidth=2;
      for(let y=0;y<h;y+=ts){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
      for(let x=0;x<w;x+=ts){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
      for(let i=0;i<2000;i++){
        ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.04})`;
        ctx.fillRect(Math.random()*w,Math.random()*h,Math.random()*3,1);
      }
    } else if(s==='concrete'){
      ctx.fillStyle=`hsl(210,${2+Math.random()*4}%,${22+Math.random()*18}%)`;
      ctx.fillRect(0,0,w,h);
      for(let i=0;i<6000;i++){
        ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.025})`;
        ctx.fillRect(Math.random()*w,Math.random()*h,Math.random()*4,1);
      }
    } else if(s==='marble'){
      ctx.fillStyle=`hsl(0,0%,${18+Math.random()*12}%)`;
      ctx.fillRect(0,0,w,h);
      for(let i=0;i<8;i++){
        ctx.strokeStyle=`rgba(255,255,255,${0.04+Math.random()*0.06})`;
        ctx.lineWidth=r(1,4);
        ctx.beginPath();
        let x=Math.random()*w,y=0; ctx.moveTo(x,y);
        for(let j=0;j<15;j++){x+=(Math.random()-0.5)*90;y+=Math.random()*40;ctx.lineTo(x,y);}
        ctx.stroke();
      }
    } else if(s==='wood'){
      for(let x=0;x<w;x++){
        ctx.fillStyle=`hsl(28,${20+Math.random()*10}%,${18+Math.sin(x*0.5)*5+Math.random()*4}%)`;
        ctx.fillRect(x,0,1,h);
      }
    } else {
      ctx.fillStyle=`hsl(0,0%,${25+Math.random()*10}%)`;
      ctx.fillRect(0,0,w,h);
      for(let i=0;i<600;i++){
        ctx.fillStyle=`hsla(${Math.random()*360},25%,${45+Math.random()*25}%,0.7)`;
        ctx.beginPath(); ctx.arc(Math.random()*w,Math.random()*h,r(1.5,7),0,Math.PI*2); ctx.fill();
      }
    }
  });
}

function makeCeilTex(){
  const s=ri(0,2);
  return makeCanvas(512,512,(ctx,w,h)=>{
    if(s===0){
      ctx.fillStyle=`hsl(0,0%,${94+Math.random()*4}%)`; ctx.fillRect(0,0,w,h);
      for(let i=0;i<3000;i++){
        ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.025})`;
        ctx.beginPath(); ctx.arc(Math.random()*w,Math.random()*h,Math.random()*2.5,0,Math.PI*2); ctx.fill();
      }
    } else if(s===1){
      ctx.fillStyle=`hsl(210,3%,${80+Math.random()*10}%)`; ctx.fillRect(0,0,w,h);
      for(let i=0;i<3000;i++){
        ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.045})`;
        ctx.fillRect(Math.random()*w,Math.random()*h,Math.random()*4,1);
      }
    } else {
      ctx.fillStyle=`hsl(0,0%,${88+Math.random()*8}%)`; ctx.fillRect(0,0,w,h);
      ctx.strokeStyle='rgba(200,200,200,0.25)'; ctx.lineWidth=1;
      for(let y=0;y<h;y+=80){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
      for(let x=0;x<w;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
    }
  });
}

function makeForestTex(){
  const isRain=Math.random()>0.45;
  return makeCanvas(1024,768,(ctx,w,h)=>{
    const sky=ctx.createLinearGradient(0,0,0,h);
    if(isRain){sky.addColorStop(0,'#78899a');sky.addColorStop(1,'#506070');}
    else{sky.addColorStop(0,'#5ba3d0');sky.addColorStop(0.5,'#9ec8e8');sky.addColorStop(1,'#b8dba0');}
    ctx.fillStyle=sky; ctx.fillRect(0,0,w,h);
    if(!isRain){
      ctx.fillStyle='rgba(255,255,200,0.6)';
      ctx.beginPath(); ctx.arc(w*0.75,h*0.15,40,0,Math.PI*2); ctx.fill();
      for(let i=0;i<8;i++){
        const angle=i*(Math.PI*2/8);
        ctx.strokeStyle='rgba(255,255,180,0.15)'; ctx.lineWidth=12;
        ctx.beginPath(); ctx.moveTo(w*0.75,h*0.15);
        ctx.lineTo(w*0.75+Math.cos(angle)*200,h*0.15+Math.sin(angle)*200); ctx.stroke();
      }
    }
    const ground=ctx.createLinearGradient(0,h*0.65,0,h);
    ground.addColorStop(0,isRain?'#3a4a3a':'#2a4a2a');
    ground.addColorStop(1,isRain?'#1a2a1a':'#1a3a1a');
    ctx.fillStyle=ground; ctx.fillRect(0,h*0.65,w,h*0.35);
    for(let i=0;i<50;i++){
      const tx=Math.random()*w;
      const tBase=h*(0.55+Math.random()*0.15);
      const th=h*(0.2+Math.random()*0.35);
      const tw=th*0.4;
      const sat=isRain?15:30;
      const lum=isRain?20+Math.random()*15:15+Math.random()*20;
      ctx.fillStyle=`hsl(25,20%,${15+Math.random()*8}%)`;
      ctx.fillRect(tx-3,tBase-th*0.15,6,th*0.2);
      ctx.fillStyle=`hsl(${110+Math.random()*30},${sat}%,${lum}%)`;
      ctx.beginPath(); ctx.ellipse(tx,tBase-th*0.5,tw*0.5,th*0.55,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=`rgba(255,255,255,0.04)`;
      ctx.beginPath(); ctx.ellipse(tx-tw*0.1,tBase-th*0.6,tw*0.2,th*0.2,0,0,Math.PI*2); ctx.fill();
    }
    if(isRain){
      ctx.strokeStyle='rgba(180,200,220,0.25)'; ctx.lineWidth=1;
      for(let i=0;i<300;i++){
        const rx=Math.random()*w, ry=Math.random()*h;
        ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(rx-3,ry+20); ctx.stroke();
      }
    }
  });
}

function makeExitTex(){
  return makeCanvas(256,96,(ctx,w,h)=>{
    ctx.fillStyle='#006622'; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle='#00ff44'; ctx.lineWidth=3; ctx.strokeRect(2,2,w-4,h-4);
    ctx.fillStyle='#00ff44';
    ctx.font='bold 36px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('EXIT',w*0.62,h*0.5);
    ctx.beginPath(); ctx.arc(w*0.18,h*0.28,10,0,Math.PI*2); ctx.fill();
    ctx.fillRect(w*0.14,h*0.45,12,20);
    ctx.fillRect(w*0.11,h*0.72,8,18); ctx.fillRect(w*0.2,h*0.72,8,18);
    ctx.fillRect(w*0.14,h*0.5,10,12);
    ctx.beginPath(); ctx.moveTo(w*0.27,h*0.35); ctx.lineTo(w*0.38,h*0.35);
    ctx.lineWidth=5; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(w*0.35,h*0.25); ctx.lineTo(w*0.38,h*0.35); ctx.lineTo(w*0.35,h*0.45);
    ctx.lineWidth=5; ctx.stroke();
  });
}
const EXIT_TEX = makeExitTex();

function mkMat(col, rough, metal, emissive, emissIntensity){
  return new THREE.MeshStandardMaterial({
    color: col||0xeeeeee, roughness: rough!==undefined?rough:0.7,
    metalness: metal||0.0, emissive: emissive||0x000000, emissiveIntensity: emissIntensity||0,
  });
}

const SHAPES = ['RECT','RECT','RECT','DOME','ATRIUM','CORRIDOR','VAULT','L-SHAPE'];

function buildRoom(){
  const shape = SHAPES[ri(0,SHAPES.length-1)];
  const grp = new THREE.Group();
  const doorPositions = [];

  const wallTex = makeWallTex();
  const floorTex = makeFloorTex();
  const ceilTex = makeCeilTex();
  const forestTex = makeForestTex();

  wallTex.repeat.set(4,2);
  floorTex.repeat.set(8,8);
  ceilTex.repeat.set(8,8);

  const wallM = new THREE.MeshStandardMaterial({ map:wallTex, roughness:0.75+Math.random()*0.2, metalness:0.02 });
  const floorM = new THREE.MeshStandardMaterial({ map:floorTex, roughness:0.35+Math.random()*0.3, metalness:0.05+Math.random()*0.08 });
  const ceilM = new THREE.MeshStandardMaterial({ map:ceilTex, roughness:0.9, metalness:0.0 });

  let W, D, H;
  if(shape==='CORRIDOR'){W=r(6,10);D=r(28,55);H=r(5,10);}
  else if(shape==='DOME'){const rad=r(8,18);W=rad*2;D=rad*2;H=rad*1.3;}
  else if(shape==='ATRIUM'){W=r(18,38);D=r(18,38);H=r(18,32);}
  else if(shape==='VAULT'){W=r(10,18);D=r(20,38);H=r(8,16);}
  else{W=r(16,42);D=r(16,42);H=r(5.5,14);}
  currentRoomDims={W,D,H};
  const THICK=0.28;

  const floorGeo=new THREE.BoxGeometry(W+THICK*2,THICK,D+THICK*2);
  const floor=new THREE.Mesh(floorGeo,floorM);
  floor.position.y=-THICK/2; floor.receiveShadow=true; grp.add(floor);

  const ceil=new THREE.Mesh(new THREE.BoxGeometry(W+THICK*2,THICK,D+THICK*2),ceilM);
  ceil.position.y=H+THICK/2; ceil.receiveShadow=true; grp.add(ceil);

  function addWall(wx,wy,wz,wW,wH,wD){
    const wall=new THREE.Mesh(new THREE.BoxGeometry(wW,wH,wD),wallM.clone());
    wall.position.set(wx,wy,wz);
    wall.castShadow=wall.receiveShadow=true;
    grp.add(wall); return wall;
  }

  if(shape==='DOME'){
    const rad=W/2;
    const dome=new THREE.Mesh(new THREE.SphereGeometry(rad,32,16,0,Math.PI*2,0,Math.PI*0.6),ceilM);
    dome.position.y=0; grp.add(dome);
    const cylWall=new THREE.Mesh(new THREE.CylinderGeometry(rad,rad,H*0.35,32,1,true),wallM);
    cylWall.position.y=H*0.17; grp.add(cylWall);
    grp.remove(floor);
    const circFloor=new THREE.Mesh(new THREE.CylinderGeometry(rad,rad,THICK,32),floorM);
    circFloor.position.y=-THICK/2; circFloor.receiveShadow=true; grp.add(circFloor);
    grp.remove(ceil);
    const nd=ri(1,3);
    for(let i=0;i<nd;i++){
      const a=(i/nd)*Math.PI*2+Math.random()*0.4;
      doorPositions.push({pos:new THREE.Vector3(Math.sin(a)*(rad-0.5),0,Math.cos(a)*(rad-0.5)),rot:a+Math.PI});
    }
  } else if(shape==='VAULT'){
    addWall(-W/2,H/2,0,THICK,H,D);
    addWall(W/2,H/2,0,THICK,H,D);
    addWall(0,H/2,-D/2,W+THICK*2,H,THICK);
    addWall(0,H/2,D/2,W+THICK*2,H,THICK);
    const ribM=mkMat(0xf0eeea,0.85,0);
    const ribCount=ri(5,10);
    for(let i=0;i<=ribCount;i++){
      const z=-D/2+i*(D/ribCount);
      const arch=new THREE.Mesh(new THREE.TorusGeometry(W/2,0.14,8,24,Math.PI),ribM);
      arch.position.set(0,H*0.1,z); arch.rotation.z=Math.PI; grp.add(arch);
    }
    doorPositions.push({pos:new THREE.Vector3(0,0,-D/2+0.5),rot:0});
    if(Math.random()>0.35) doorPositions.push({pos:new THREE.Vector3(0,0,D/2-0.5),rot:Math.PI});
  } else if(shape==='CORRIDOR'){
    addWall(-W/2,H/2,0,THICK,H,D);
    addWall(W/2,H/2,0,THICK,H,D);
    addWall(0,H/2,-D/2,W+THICK*2,H,THICK);
    addWall(0,H/2,D/2,W+THICK*2,H,THICK);
    const archM=mkMat(0xf0eeea,0.85,0);
    const ac=ri(4,10);
    for(let i=1;i<ac;i++){
      const az=-D/2+i*(D/ac);
      const ap1=new THREE.Mesh(new THREE.BoxGeometry(0.22,H*0.65,0.22),archM);
      ap1.position.set(-W/2+0.11,H*0.325,az); grp.add(ap1);
      const ap2=ap1.clone(); ap2.position.set(W/2-0.11,H*0.325,az); grp.add(ap2);
      const aArch=new THREE.Mesh(new THREE.TorusGeometry(W*0.35,0.1,8,20,Math.PI),archM);
      aArch.position.set(0,H*0.65,az); aArch.rotation.z=Math.PI; grp.add(aArch);
    }
    doorPositions.push({pos:new THREE.Vector3(0,0,-D/2+0.4),rot:0});
    doorPositions.push({pos:new THREE.Vector3(0,0,D/2-0.4),rot:Math.PI});
  } else if(shape==='ATRIUM'){
    addWall(-W/2,H/2,0,THICK,H,D);
    addWall(W/2,H/2,0,THICK,H,D);
    addWall(0,H/2,-D/2,W+THICK*2,H,THICK);
    addWall(0,H/2,D/2,W+THICK*2,H,THICK);
    const numFloors=ri(2,4);
    const fH=H/(numFloors+1);
    const bMat=mkMat(0xf0eeea,0.7,0.05);
    const railM=mkMat(0xcccccc,0.2,0.7);
    for(let f=1;f<=numFloors;f++){
      const fy=f*fH;
      const bD=r(2,3.5);
      [[-1,0],[1,0],[0,-1],[0,1]].forEach(([nx,nz])=>{
        const bWW=nx!==0?bD:W-bD*2;
        const bDD=nz!==0?bD:D-bD*2;
        const bx=nx*(W/2-bD/2);
        const bz=nz*(D/2-bD/2);
        const balc=new THREE.Mesh(new THREE.BoxGeometry(bWW,0.16,bDD),bMat);
        balc.position.set(bx,fy,bz); grp.add(balc);
        const rLen=nx!==0?bDD:bWW;
        const bCount=Math.floor(rLen/0.45);
        for(let bi=0;bi<bCount;bi++){
          const bst=new THREE.Mesh(new THREE.BoxGeometry(0.05,1.0,0.05),railM);
          const t=bi/bCount-0.5;
          bst.position.set(bx+(nx!==0?bDD*t:rLen*t),fy+0.5,bz+(nz!==0?bDD*t:rLen*t));
          grp.add(bst);
        }
      });
    }
    doorPositions.push({pos:new THREE.Vector3(0,0,-D/2+0.5),rot:0});
    if(Math.random()>0.3) doorPositions.push({pos:new THREE.Vector3(0,0,D/2-0.5),rot:Math.PI});
  } else {
    addWall(-W/2,H/2,0,THICK,H,D);
    addWall(W/2,H/2,0,THICK,H,D);
    addWall(0,H/2,-D/2,W+THICK*2,H,THICK);
    addWall(0,H/2,D/2,W+THICK*2,H,THICK);
    if(shape==='L-SHAPE'){
      const corner=ri(0,3);
      const cw=W*r(0.35,0.55), cd=D*r(0.35,0.55);
      const cx=corner<2?-W/2+cw/2:W/2-cw/2;
      const cz=corner%2===0?-D/2+cd/2:D/2-cd/2;
      addWall(cx,H/2,cz,cw,H,THICK);
      addWall(cx,H/2,cz,THICK,H,cd);
    }
    const walls=[
      {p:new THREE.Vector3(0,0,-D/2+0.5),rot:0},
      {p:new THREE.Vector3(0,0,D/2-0.5),rot:Math.PI},
      {p:new THREE.Vector3(-W/2+0.5,0,0),rot:Math.PI/2},
      {p:new THREE.Vector3(W/2-0.5,0,0),rot:-Math.PI/2},
    ];
    const nd=ri(1,3);
    walls.sort(()=>Math.random()-0.5).slice(0,nd).forEach(w=>doorPositions.push({pos:w.p,rot:w.rot}));
  }

  // LIGHTING
  grp.add(new THREE.AmbientLight(0xffffff,0.22));
  const numLights=ri(2,5);
  for(let i=0;i<numLights;i++){
    const lx=r(-W*0.3,W*0.3), lz=r(-D*0.3,D*0.3);
    const col=[0xffffff,0xfff8f0,0xf0f4ff][ri(0,2)];
    const spot=new THREE.SpotLight(col,r(1.8,4.5),H*4,Math.PI/4,0.4,1.2);
    spot.position.set(lx,H-0.3,lz); spot.target.position.set(lx,0,lz);
    spot.castShadow=true; spot.shadow.mapSize.set(512,512);
    grp.add(spot); grp.add(spot.target);
    const fix=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.18,0.07,8),
      new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:2,roughness:0.2}));
    fix.position.set(lx,H-0.035,lz); grp.add(fix);
    const cord=new THREE.Mesh(new THREE.CylinderGeometry(0.01,0.01,r(0.3,1.5),4),mkMat(0x444444,0.8,0.2));
    cord.position.set(lx,H-0.07-cord.geometry.parameters.height/2,lz); grp.add(cord);
  }
  for(let i=0;i<ri(2,5);i++){
    const pl=new THREE.PointLight([0xfff5e0,0xe8f0ff,0xffffff][ri(0,2)],r(0.5,1.8),r(10,25));
    pl.position.set(r(-W*0.4,W*0.4),r(H*0.4,H*0.85),r(-D*0.4,D*0.4));
    grp.add(pl);
  }

  addWindows(grp,W,D,H,forestTex,wallM);
  addElectricalDetails(grp,W,D,H);

  const skM=mkMat(0xfafafa,0.85,0);
  [[0,0,-D/2,W,0.09,0.09],[0,0,D/2,W,0.09,0.09],[-W/2,0,0,0.09,0.09,D],[W/2,0,0,0.09,0.09,D]].forEach(([x,y,z,sw,sh,sd])=>{
    const sk=new THREE.Mesh(new THREE.BoxGeometry(sw,sh,sd),skM);
    sk.position.set(x,0.045,z); grp.add(sk);
  });

  const doorObjs = addDoors(grp,doorPositions,H);
  addDecorations(grp,W,D,H);
  addPaintings(grp,W,D,H);
  if(Math.random()<0.4) addMemo(grp,W,D,H);
  if(Math.random()<0.28) addCreatureToRoom(grp,W,D,H);

  return {grp, doors:doorObjs};
}

function addWindows(grp,W,D,H,forestTex,wallM){
  const winM=new THREE.MeshStandardMaterial({
    map:forestTex,roughness:0.0,metalness:0.05,
    emissive:new THREE.Color(0.9,0.95,1.0),emissiveIntensity:0.12,emissiveMap:forestTex,
    side:THREE.DoubleSide
  });
  const frameM=mkMat(0xfafafa,0.5,0.1);
  const allGlass=Math.random()<0.1;
  const wallDefs=[
    {axis:'z',val:-D/2+0.02,rot:0,span:W},
    {axis:'z',val:D/2-0.02,rot:Math.PI,span:W},
    {axis:'x',val:-W/2+0.02,rot:Math.PI/2,span:D},
    {axis:'x',val:W/2-0.02,rot:-Math.PI/2,span:D},
  ];
  wallDefs.forEach(wd=>{
    if(allGlass||Math.random()>0.3){
      const nw=allGlass?ri(2,5):ri(1,3);
      for(let i=0;i<nw;i++){
        const wW=allGlass?wd.span/(nw+0.5)*0.8:r(2,5.5);
        const wH=r(H*0.3,H*0.75);
        const wy=r(wH/2+0.4,H-wH/2-0.3);
        const offset=r(-wd.span*0.25,wd.span*0.25);
        let px=0,pz=0;
        if(wd.axis==='z'){px=offset;pz=wd.val;}
        else{px=wd.val;pz=offset;}
        const glass=new THREE.Mesh(new THREE.PlaneGeometry(wW,wH),winM);
        glass.position.set(px,wy,pz); glass.rotation.y=wd.rot; grp.add(glass);
        const wl=new THREE.PointLight(0xd0e8ff,r(0.4,1.2),Math.max(W,D)*0.45);
        wl.position.set(px+Math.sin(wd.rot)*2,wy,pz+Math.cos(wd.rot)*2); grp.add(wl);
      }
    }
  });
}

function addElectricalDetails(grp,W,D,H){
  const detM=mkMat(0xeeeeee,0.65);
  const wallSides=[
    {axis:'z',val:-D/2+0.06,rot:0},
    {axis:'z',val:D/2-0.06,rot:Math.PI},
    {axis:'x',val:-W/2+0.06,rot:Math.PI/2},
    {axis:'x',val:W/2-0.06,rot:-Math.PI/2},
  ];
  for(let i=0;i<ri(3,8);i++){
    const sd=wallSides[ri(0,3)];
    const offset=r(-Math.min(W,D)*0.3,Math.min(W,D)*0.3);
    let px=0,pz=0;
    if(sd.axis==='z'){px=offset;pz=sd.val;} else{px=sd.val;pz=offset;}
    const plate=new THREE.Mesh(new THREE.BoxGeometry(0.07,0.11,0.02),detM);
    plate.position.set(px,r(0.25,0.35),pz); plate.rotation.y=sd.rot; grp.add(plate);
  }
  for(let i=0;i<ri(2,5);i++){
    const sd=wallSides[ri(0,3)];
    const offset=r(-Math.min(W,D)*0.3,Math.min(W,D)*0.3);
    let px=0,pz=0;
    if(sd.axis==='z'){px=offset;pz=sd.val;} else{px=sd.val;pz=offset;}
    const panel=new THREE.Mesh(new THREE.BoxGeometry(0.09,0.09,0.022),detM);
    panel.position.set(px,r(1.1,1.4),pz); panel.rotation.y=sd.rot; grp.add(panel);
  }
}

function addDoors(grp,doorPositions,H){
  const doorObjs=[];
  const dH=Math.min(2.6,H*0.52);
  const dW=1.1;
  const frameM=mkMat(0xf0efe8,0.6,0.04);
  const doorM=mkMat(0xe8e6e0,0.72,0.02);
  const handleM=mkMat(0xbbbbbb,0.12,0.88);
  const exitMat=new THREE.MeshStandardMaterial({
    map:EXIT_TEX,emissive:new THREE.Color(0,1,0.4),emissiveIntensity:2.0,emissiveMap:EXIT_TEX
  });
  doorPositions.forEach(dp=>{
    const dg=new THREE.Group();
    dg.position.copy(dp.pos); dg.rotation.y=dp.rot;
    const fL=new THREE.Mesh(new THREE.BoxGeometry(0.1,dH+0.18,0.22),frameM);
    fL.position.set(-dW/2-0.05,dH/2,0); dg.add(fL);
    const fR=fL.clone(); fR.position.set(dW/2+0.05,dH/2,0); dg.add(fR);
    const fT=new THREE.Mesh(new THREE.BoxGeometry(dW+0.2,0.1,0.22),frameM);
    fT.position.set(0,dH+0.09,0); dg.add(fT);
    const panel=new THREE.Mesh(new THREE.BoxGeometry(dW,dH,0.07),doorM);
    panel.position.set(0,dH/2,0); panel.receiveShadow=true; dg.add(panel);
    const handle=new THREE.Mesh(new THREE.CylinderGeometry(0.022,0.022,0.15,8),handleM);
    handle.rotation.z=Math.PI/2; handle.position.set(dW*0.38,dH*0.48,0.06); dg.add(handle);
    const sign=new THREE.Mesh(new THREE.PlaneGeometry(0.65,0.24),exitMat);
    sign.position.set(0,dH+0.42,0.12); dg.add(sign);
    const glow=new THREE.PointLight(0x00ff55,1.2,4.0);
    glow.position.set(0,dH+0.42,0.3); dg.add(glow);
    grp.add(dg);
    const trigger=new THREE.Mesh(
      new THREE.BoxGeometry(dW+0.4,dH,1.0),
      new THREE.MeshBasicMaterial({visible:false,transparent:true,opacity:0})
    );
    trigger.position.copy(dp.pos); trigger.position.y=dH/2; trigger.rotation.y=dp.rot;
    trigger.userData.isDoor=true;
    grp.add(trigger);
    doorObjs.push({mesh:trigger,pos:dp.pos.clone(),rot:dp.rot});
  });
  return doorObjs;
}

function addDecorations(grp,W,D,H){
  const types=['bench','plant','stairDesign','spiralStair','obelisk','torus',
    'neonFrame','arch','pyramid','mirrorPillar','crystal','stackedBoxes',
    'pendulum','wireframeCube','orb','slab','appleWatch','pipeCluster',
    'vhsUnit','crtTV','videoTape','oilTimer','hvac','table'];
  const count=ri(7,18);
  for(let i=0;i<count;i++){
    const t=types[ri(0,types.length-1)];
    const obj=makeItem(t,H);
    if(!obj) continue;
    obj.position.set(r(-W*0.38,W*0.38),0,r(-D*0.38,D*0.38));
    grp.add(obj);
  }
  const st=makeItem(Math.random()>0.5?'stairDesign':'spiralStair',H);
  if(st){st.position.set(r(-W*0.3,W*0.3),0,r(-D*0.3,D*0.3));grp.add(st);}
}

function makeItem(type,H){
  const g=new THREE.Group();
  const wM=(rough,metal)=>mkMat(0xf0f0f0,rough||0.65,metal||0);
  const mtM=()=>mkMat(0xaaaaaa,0.12,0.9);
  const dkM=()=>mkMat(0x111111,0.8,0);
  const cnM=()=>mkMat(0xcccccc,0.9,0);

  switch(type){
    case 'bench':{
      const seat=new THREE.Mesh(new THREE.BoxGeometry(1.7,0.07,0.48),wM(0.7));
      seat.position.y=0.44; seat.castShadow=true; g.add(seat);
      [[0.7,0.18],[0.7,-0.18],[-0.7,0.18],[-0.7,-0.18]].forEach(([lx,lz])=>{
        const l=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.44,0.04),mtM());
        l.position.set(lx,0.22,lz); l.castShadow=true; g.add(l);
      });
      break;
    }
    case 'plant':{
      const pot=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.15,0.38,12),mkMat(0xcc9966,0.85));
      pot.position.y=0.19; g.add(pot);
      for(let i=0;i<ri(5,14);i++){
        const leaf=new THREE.Mesh(
          new THREE.PlaneGeometry(r(0.25,0.65),r(0.55,1.35)),
          new THREE.MeshStandardMaterial({color:new THREE.Color(r(0.1,0.3),r(0.4,0.7),r(0.1,0.3)),roughness:0.9,side:THREE.DoubleSide})
        );
        leaf.position.set(Math.sin(i*1.1)*0.15,0.38+i*0.11,Math.cos(i*1.1)*0.15);
        leaf.rotation.y=i*0.85; leaf.rotation.z=-0.2+Math.random()*0.4;
        leaf.castShadow=true; g.add(leaf);
      }
      break;
    }
    case 'stairDesign':{
      const n=ri(5,12);
      const m=[wM(0.7),cnM(),mtM()][ri(0,2)];
      for(let i=0;i<n;i++){
        const s=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.16,0.3),m);
        s.position.set(0,i*0.16+0.08,-i*0.3); s.castShadow=s.receiveShadow=true; g.add(s);
      }
      break;
    }
    case 'spiralStair':{
      const n=ri(8,18);
      const R=r(0.8,1.3);
      const m=[wM(0.6),mtM()][ri(0,1)];
      for(let i=0;i<n;i++){
        const a=i*(Math.PI/5);
        const s=new THREE.Mesh(new THREE.BoxGeometry(0.85,0.09,0.26),m);
        s.position.set(Math.sin(a)*R,i*0.24,Math.cos(a)*R);
        s.rotation.y=-a; s.castShadow=true; g.add(s);
      }
      const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,n*0.24,8),mtM());
      pole.position.y=n*0.12; g.add(pole);
      break;
    }
    case 'obelisk':{
      const h=r(2.5,6);
      const m=[wM(0.5),dkM(),cnM()][ri(0,2)];
      const shaft=new THREE.Mesh(new THREE.BoxGeometry(0.28,h*0.85,0.28),m);
      shaft.position.y=h*0.425; shaft.castShadow=true; g.add(shaft);
      const tip=new THREE.Mesh(new THREE.ConeGeometry(0.2,h*0.18,4),m);
      tip.position.y=h*0.85+h*0.09; tip.castShadow=true; g.add(tip);
      break;
    }
    case 'torus':{
      const R=r(0.5,1.6);
      const m=[wM(0.25,0.1),mtM(),new THREE.MeshStandardMaterial({color:0x111111,roughness:0.02,metalness:0.99})][ri(0,2)];
      const t=new THREE.Mesh(new THREE.TorusGeometry(R,R*0.11,12,40),m);
      t.position.y=R+0.05; t.rotation.x=r(0,Math.PI); t.rotation.z=r(-0.25,0.25);
      t.castShadow=true; g.add(t);
      break;
    }
    case 'neonFrame':{
      const cols=[0x00ffff,0xff00ff,0xffff00,0xff6600,0x00ff88,0xff0066,0xaa00ff];
      const col=cols[ri(0,cols.length-1)];
      const fw=r(1,3.2),fh=r(1.5,4);
      const nm=new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:3,roughness:0.3});
      const bars=[[fw+0.08,0.05,0.05,0,fh+0.025,0],[fw+0.08,0.05,0.05,0,0.025,0],
        [0.05,fh,0.05,-fw/2,fh/2,0],[0.05,fh,0.05,fw/2,fh/2,0]];
      bars.forEach(([bw,bh,bd,bx,by,bz])=>{
        const b=new THREE.Mesh(new THREE.BoxGeometry(bw,bh,bd),nm);
        b.position.set(bx,by,bz); g.add(b);
      });
      const pl=new THREE.PointLight(col,1.8,7); pl.position.set(0,fh/2,0.6); g.add(pl);
      break;
    }
    case 'arch':{
      const aw=r(1.5,3.8),ah=r(2,4.5);
      const m=[wM(0.85),cnM()][ri(0,1)];
      const p1=new THREE.Mesh(new THREE.BoxGeometry(0.24,ah,0.24),m);
      p1.position.set(-aw/2,ah/2,0); p1.castShadow=true; g.add(p1);
      const p2=p1.clone(); p2.position.set(aw/2,ah/2,0); g.add(p2);
      const arch=new THREE.Mesh(new THREE.TorusGeometry(aw/2,0.11,8,20,Math.PI),m);
      arch.position.set(0,ah,0); arch.rotation.z=Math.PI; arch.castShadow=true; g.add(arch);
      break;
    }
    case 'pyramid':{
      const bw=r(0.5,2.2),bh=r(1,5.5);
      const m=[wM(0.6),dkM(),cnM()][ri(0,2)];
      const p=new THREE.Mesh(new THREE.ConeGeometry(bw,bh,4),m);
      p.position.y=bh/2; p.castShadow=true; g.add(p);
      break;
    }
    case 'mirrorPillar':{
      const h=r(2,Math.min(H*0.9,7));
      const mm=new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.015,metalness:0.99});
      const geo=[new THREE.CylinderGeometry(0.16,0.16,h,20),
        new THREE.BoxGeometry(0.28,h,0.28),new THREE.CylinderGeometry(0.18,0.18,h,6)][ri(0,2)];
      const p=new THREE.Mesh(geo,mm); p.position.y=h/2; p.castShadow=true; g.add(p);
      break;
    }
    case 'crystal':{
      const cm=new THREE.MeshStandardMaterial({color:0xffffff,roughness:0,metalness:0,transparent:true,opacity:0.55});
      const c=new THREE.Mesh(new THREE.OctahedronGeometry(r(0.3,0.85)),cm);
      c.position.y=r(0.6,1.8); c.rotation.y=Math.random()*Math.PI;
      const gcols=[0x88ffff,0xffaaff,0xffffff,0xaaffaa,0xffeeaa];
      const pl=new THREE.PointLight(gcols[ri(0,gcols.length-1)],1.4,4);
      pl.position.set(0,c.position.y,0); g.add(pl);
      c.castShadow=true; g.add(c);
      break;
    }
    case 'stackedBoxes':{
      let y=0;
      for(let i=0;i<ri(2,7);i++){
        const bw=r(0.3,1.6);
        const bh=r(0.18,0.85);
        const m=[wM(),cnM(),dkM(),mkMat(0x888888,0.3,0.6)][ri(0,3)];
        const b=new THREE.Mesh(new THREE.BoxGeometry(bw,bh,bw*r(0.7,1.3)),m);
        b.position.y=y+bh/2; b.rotation.y=Math.random()*0.4-0.2;
        b.castShadow=true; g.add(b); y+=bh;
      }
      break;
    }
    case 'pendulum':{
      const rh=r(H*0.35,H*0.8);
      if(rh<0.5) break;
      const rod=new THREE.Mesh(new THREE.CylinderGeometry(0.018,0.018,rh,6),mtM());
      rod.position.y=H-rh/2-0.05; g.add(rod);

function addPaintings(grp,W,D,H){
  const count=ri(4,12);
  const wallDefs=[
    {axis:'z',val:-D/2+0.04,rot:0,span:W},
    {axis:'z',val:D/2-0.04,rot:Math.PI,span:W},
    {axis:'x',val:-W/2+0.04,rot:Math.PI/2,span:D},
    {axis:'x',val:W/2-0.04,rot:-Math.PI/2,span:D},
  ];
  for(let i=0;i<count;i++){
    const wd=wallDefs[ri(0,wallDefs.length-1)];
    const pw=r(0.5,2.2), ph=r(0.4,1.8);
    const py=r(Math.max(ph/2+0.3,H*0.25),Math.min(H*0.82,H-ph/2-0.1));
    const offset=r(-wd.span*0.38,wd.span*0.38);
    let px=0,pz=0;
    if(wd.axis==='z'){px=offset;pz=wd.val;}
    else{px=wd.val;pz=offset;}
    const paintTex=makeCanvas(512,512,(ctx,cw,ch)=>{
      const styles=['abstract','geometric','minimal','dark','gradient','glitch','noise'];
      const style=styles[ri(0,styles.length-1)];
      if(style==='abstract'){
        const bg=ctx.createLinearGradient(0,0,cw,ch);
        bg.addColorStop(0,`hsl(${Math.random()*360},30%,${15+Math.random()*20}%)`);
        bg.addColorStop(1,`hsl(${Math.random()*360},25%,${20+Math.random()*25}%)`);
        ctx.fillStyle=bg; ctx.fillRect(0,0,cw,ch);
        for(let j=0;j<ri(8,30);j++){
          ctx.beginPath();
          const shapeType=ri(0,2);
          if(shapeType===0){
            ctx.arc(Math.random()*cw,Math.random()*ch,r(20,150),0,Math.PI*2);
          } else if(shapeType===1){
            ctx.rect(Math.random()*cw,Math.random()*ch,r(40,200),r(40,200));
          } else {
            ctx.moveTo(Math.random()*cw,Math.random()*ch);
            for(let k=0;k<ri(3,6);k++) ctx.lineTo(Math.random()*cw,Math.random()*ch);
            ctx.closePath();
          }
          ctx.fillStyle=`hsla(${Math.random()*360},${40+Math.random()*50}%,${30+Math.random()*50}%,${0.3+Math.random()*0.5})`;
          ctx.fill();
        }
      } else if(style==='geometric'){
        ctx.fillStyle=`hsl(0,0%,${10+Math.random()*20}%)`; ctx.fillRect(0,0,cw,ch);
        const n=ri(5,20);
        for(let j=0;j<n;j++){
          const cx2=Math.random()*cw, cy2=Math.random()*ch;
          const r2=r(10,Math.min(cw,ch)*0.4);
          const sides=ri(3,8);
          ctx.beginPath();
          for(let k=0;k<sides;k++){
            const a=k/sides*Math.PI*2-Math.PI/2;
            k===0?ctx.moveTo(cx2+Math.cos(a)*r2,cy2+Math.sin(a)*r2)
                 :ctx.lineTo(cx2+Math.cos(a)*r2,cy2+Math.sin(a)*r2);
          }
          ctx.closePath();
          ctx.strokeStyle=`hsla(${Math.random()*360},${50+Math.random()*50}%,${50+Math.random()*40}%,${0.5+Math.random()*0.5})`;
          ctx.lineWidth=r(1,4); ctx.stroke();
        }
      } else if(style==='minimal'){
        ctx.fillStyle=`hsl(0,0%,${90+Math.random()*8}%)`; ctx.fillRect(0,0,cw,ch);
        const lines=ri(1,5);
        for(let j=0;j<lines;j++){
          ctx.strokeStyle=`hsl(0,0%,${Math.random()*30}%)`;
          ctx.lineWidth=r(1,3);
          const y=cw*(0.2+j*(0.6/lines));
          ctx.beginPath(); ctx.moveTo(cw*0.1,y); ctx.lineTo(cw*0.9,y+Math.random()*8-4); ctx.stroke();
        }
        ctx.fillStyle=`hsl(${Math.random()*360},${40+Math.random()*50}%,${30+Math.random()*40}%)`;
        ctx.fillRect(cw*r(0.1,0.4),ch*r(0.1,0.4),cw*r(0.1,0.5),ch*r(0.1,0.5));
      } else if(style==='dark'){
        ctx.fillStyle='#050505'; ctx.fillRect(0,0,cw,ch);
        for(let j=0;j<ri(3,12);j++){
          const col=`hsl(${Math.random()*360},${60+Math.random()*40}%,${40+Math.random()*30}%)`;
          ctx.fillStyle=col;
          ctx.beginPath(); ctx.arc(Math.random()*cw,Math.random()*ch,r(5,60),0,Math.PI*2); ctx.fill();
          ctx.shadowColor=col; ctx.shadowBlur=30;
          ctx.fill(); ctx.shadowBlur=0;
        }
      } else if(style==='gradient'){
        const g2d=ctx.createLinearGradient(0,0,cw*(Math.random()>0.5?1:0),ch);
        const stops=ri(2,5);
        for(let j=0;j<=stops;j++){
          g2d.addColorStop(j/stops,`hsl(${Math.random()*360},${40+Math.random()*50}%,${25+Math.random()*40}%)`);
        }
        ctx.fillStyle=g2d; ctx.fillRect(0,0,cw,ch);
      } else if(style==='glitch'){
        ctx.fillStyle='#000'; ctx.fillRect(0,0,cw,ch);
        for(let j=0;j<ri(20,50);j++){
          const gy=Math.random()*ch;
          const gH=r(2,18);
          const shift=r(-30,30);
          ctx.fillStyle=`hsla(${Math.random()*360},80%,50%,${0.5+Math.random()*0.5})`;
          ctx.fillRect(shift,gy,cw,gH);
        }
      } else {
        ctx.fillStyle=`hsl(${Math.random()*360},${15+Math.random()*30}%,${15+Math.random()*30}%)`; ctx.fillRect(0,0,cw,ch);
        for(let j=0;j<ri(5000,15000);j++){
          ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.08})`;
          ctx.fillRect(Math.random()*cw,Math.random()*ch,1,1);
        }
      }
    });
    const paintM=new THREE.MeshStandardMaterial({map:paintTex,roughness:0.55,metalness:0.02});
    const painting=new THREE.Mesh(new THREE.PlaneGeometry(pw,ph),paintM);
    painting.position.set(px,py,pz); painting.rotation.y=wd.rot;
    const frameM2=mkMat(0xf5f5f0,0.65,0.05);
    const frameGroup=new THREE.Group();
    [[pw+0.1,0.06,py+ph/2+0.03,true],[pw+0.1,0.06,py-ph/2-0.03,true],
     [0.06,ph+0.06,py,false],[0.06,ph+0.06,py,false]].slice(0,2).forEach(([fw2,fh2,fy2,_])=>{
      const fb=new THREE.Mesh(new THREE.BoxGeometry(fw2,0.03,fh2<ph?0.06:0.06),frameM2);
      fb.position.y=fy2; fb.position.set(px,fy2,pz); fb.rotation.y=wd.rot;
      grp.add(fb);
    });
    const frameL=new THREE.Mesh(new THREE.BoxGeometry(0.05,ph+0.06,0.05),frameM2);
    frameL.position.set(px+Math.sin(wd.rot)*(0),py,pz);
    grp.add(painting);
    const pl=new THREE.SpotLight(0xfff5e0,r(0.8,2.2),r(4,9),Math.PI/6,0.5,1.5);
    pl.position.set(px-Math.sin(wd.rot)*r(1.5,3.5),py+r(1,2.5),pz-Math.cos(wd.rot)*r(1.5,3.5));
    pl.target.position.set(px,py,pz);
    grp.add(pl); grp.add(pl.target);
  }
}

function addMemo(grp,W,D,H){
  const wallDefs=[
    {axis:'z',val:-D/2+0.06,rot:0},
    {axis:'z',val:D/2-0.06,rot:Math.PI},
    {axis:'x',val:-W/2+0.06,rot:Math.PI/2},
    {axis:'x',val:W/2-0.06,rot:-Math.PI/2},

  const wd=wallDefs[ri(0,3)];
  const offset=r(-Math.min(W,D)*0.25,Math.min(W,D)*0.25);
  let px=0,pz=0;
  if(wd.axis==='z'){px=offset;pz=wd.val;} else{px=wd.val;pz=offset;}
  const py=r(1.3,2.0);
  const memoM=new THREE.MeshStandardMaterial({
    color:0xfff8e8,roughness:0.95,metalness:0,
    emissive:new THREE.Color(0.5,0.45,0.3),emissiveIntensity:0.08
  });
  const memo=new THREE.Mesh(new THREE.PlaneGeometry(0.32,0.42),memoM);
  memo.position.set(px,py,pz); memo.rotation.y=wd.rot;
  memo.userData.isMemo=true;
  memo.userData.text=MEMOS[ri(0,MEMOS.length-1)];
  grp.add(memo);
  interactables.push(memo);
}

function addCreatureToRoom(grp,W,D,H){
  const c=makeCreature();
  c.position.set(r(-W*0.35,W*0.35),0,r(-D*0.35,D*0.35));
  c.userData.isCreature=true;
  c.userData.speed=r(0.015,0.045);
  c.userData.rot=Math.random()*Math.PI*2;
  c.userData.W=W; c.userData.D=D;
  grp.add(c);
  creatures.push(c);
}

function makeCreature(){
  const g=new THREE.Group();
  const type=ri(0,5);
  const col=[0xff3333,0x33ff99,0xffaa00,0xaa33ff,0xff66cc,0x33aaff][type];
  const bM=new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:0.35,roughness:0.6,metalness:0.1});
  const wireM=new THREE.MeshBasicMaterial({color:col,wireframe:true});
  if(type===0){
    const body=new THREE.Mesh(new THREE.SphereGeometry(0.32,10,8),bM);
    body.position.y=0.55; g.add(body);
    for(let i=0;i<ri(2,5);i++){
      const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.04,r(0.3,0.6),7),bM);
      leg.position.set(Math.cos(i*(Math.PI*2/5))*0.22,0.18,Math.sin(i*(Math.PI*2/5))*0.22);
      leg.rotation.z=r(-0.4,0.4); g.add(leg);
    }
    const eye=new THREE.Mesh(new THREE.SphereGeometry(0.06,8,8),new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:3}));
    eye.position.set(0.14,0.65,0.25); g.add(eye);
  } else if(type===1){
    const body=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.45,0.3),bM);
    body.position.y=0.65; g.add(body);
    const head=new THREE.Mesh(new THREE.BoxGeometry(0.28,0.28,0.28),bM);
    head.position.y=1.0; g.add(head);
    [[0.22,0.45,0],[-(0.22),0.45,0]].forEach(([lx,ly,lz])=>{
      const arm=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.38,0.08),bM);
      arm.position.set(lx,ly,lz); arm.rotation.z=lx>0?0.3:-0.3; g.add(arm);
    });
  } else if(type===2){
    const body=new THREE.Mesh(new THREE.TorusGeometry(0.25,0.09,8,20),wireM);
    body.position.y=0.55; body.userData.spin=true; body.userData.spinX=0.018; g.add(body);
    const core=new THREE.Mesh(new THREE.SphereGeometry(0.1,8,8),bM);
    core.position.y=0.55; g.add(core);
    const pl=new THREE.PointLight(col,2,3.5); pl.position.y=0.55; g.add(pl);
  } else if(type===3){
    for(let i=0;i<ri(3,7);i++){
      const seg=new THREE.Mesh(new THREE.SphereGeometry(r(0.1,0.22),8,7),bM);
      seg.position.set(0,i*0.22+0.1,0); seg.userData.sin=true; seg.userData.sinI=i; g.add(seg);
    }
  } else if(type===4){
    const body=new THREE.Mesh(new THREE.OctahedronGeometry(0.3),bM);
    body.position.y=0.55; body.userData.spin=true; body.userData.spinY=0.02; g.add(body);
    for(let i=0;i<4;i++){
      const sp=new THREE.Mesh(new THREE.SphereGeometry(0.06,6,6),
        new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:3}));
      sp.position.set(Math.cos(i*Math.PI/2)*0.4,0.55,Math.sin(i*Math.PI/2)*0.4); g.add(sp);
    }
    const pl=new THREE.PointLight(col,2.5,5); pl.position.y=0.55; g.add(pl);
  } else {
    const body=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.25,0.7,8),bM);
    body.position.y=0.35; g.add(body);
    const cap=new THREE.Mesh(new THREE.SphereGeometry(0.22,8,8),bM);
    cap.position.y=0.75; g.add(cap);
    for(let i=0;i<ri(4,8);i++){
      const tentacle=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.04,r(0.3,0.8),6),bM);
      tentacle.position.set(Math.cos(i*Math.PI/4)*0.18,0.15,Math.sin(i*Math.PI/4)*0.18);
      tentacle.rotation.x=r(-0.5,0.5); tentacle.rotation.z=r(-0.5,0.5); g.add(tentacle);
    }
  }
  g.userData.hp=3;
  return g;
}

function shootBeam(){
  const dir=new THREE.Vector3();
  camera.getWorldDirection(dir);
  const bM=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.85});
  const beam=new THREE.Mesh(new THREE.CylinderGeometry(0.022,0.022,0.5,6),bM);
  beam.position.copy(camera.position);
  beam.position.addScaledVector(dir,0.5);
  beam.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir);
  beam.userData.velocity=dir.clone().multiplyScalar(0.85);
  beam.userData.life=1.0;
  scene.add(beam);
  shootBeams.push(beam);
  const mf=new THREE.PointLight(0xffffff,5,3);
  mf.position.copy(camera.position);
  scene.add(mf);
  setTimeout(()=>scene.remove(mf),80);
}

function checkBeams(delta){
  for(let i=shootBeams.length-1;i>=0;i--){
    const b=shootBeams[i];
    b.position.add(b.userData.velocity);
    b.userData.life-=delta*2.5;
    b.material.opacity=b.userData.life*0.85;
    if(b.userData.life<=0){
      scene.remove(b); shootBeams.splice(i,1); continue;
    }
    for(let j=creatures.length-1;j>=0;j--){
      const c=creatures[j];
      if(!c.parent) continue;
      const dist=b.position.distanceTo(c.position);
      if(dist<1.0){
        c.userData.hp--;
        const flash=new THREE.PointLight(0xffffff,8,4);
        flash.position.copy(c.position); flash.position.y+=0.5;
        scene.add(flash); setTimeout(()=>scene.remove(flash),120);
        if(c.userData.hp<=0){
          const expl=new THREE.PointLight(0xffaa00,12,8);
          expl.position.copy(c.position); expl.position.y+=0.5;
          scene.add(expl); setTimeout(()=>scene.remove(expl),400);
          currentRoomGroup.remove(c);
          creatures.splice(j,1);
          if(targetCreature===c) targetCreature=null;
        }
        scene.remove(b); shootBeams.splice(i,1); break;
      }
    }
  }
}

function updateCreatures(delta, elapsed){
  const shootBtn=document.getElementById('shoot-btn');
  let anyCreature=false;
  creatures.forEach(c=>{
    if(!c.parent) return;
    anyCreature=true;
    c.userData.rot+=c.userData.speed*60*delta*(0.6+Math.sin(elapsed*0.7)*0.4);
    const W2=c.userData.W*0.4, D2=c.userData.D*0.4;
    c.position.x+=Math.sin(c.userData.rot)*c.userData.speed;
    c.position.z+=Math.cos(c.userData.rot)*c.userData.speed;
    c.position.x=Math.max(-W2,Math.min(W2,c.position.x));
    c.position.z=Math.max(-D2,Math.min(D2,c.position.z));
    c.children.forEach(ch=>{
      if(ch.userData.spin){
        if(ch.userData.spinY) ch.rotation.y+=ch.userData.spinY;
        if(ch.userData.spinX) ch.rotation.x+=ch.userData.spinX;
      }
      if(ch.userData.sin){
        ch.position.x=Math.sin(elapsed*3+ch.userData.sinI)*0.12;
      }
    });
  });
  if(shootBtn) shootBtn.style.display=anyCreature&&isMobile?'block':'none';
}

function checkDoors(){
  const pPos=camera.position;
  for(const door of currentDoors){
    const dist=pPos.distanceTo(door.pos);
    if(dist<1.8){
      transitionToNextRoom();
      return;
    }
  }
}

function checkInteractables(){
  const dir=new THREE.Vector3();
  camera.getWorldDirection(dir);
  const raycaster=new THREE.Raycaster(camera.position,dir,0,2.5);
  const meshes=interactables.filter(m=>m.parent);
  const hits=raycaster.intersectObjects(meshes,false);
  if(hits.length>0){
    const hit=hits[0].object;
    if(hit.userData.isMemo){
      showMemo(hit.userData.text);
      interactables.splice(interactables.indexOf(hit),1);
    }
  }
}

function showMemo(text){
  const popup=document.getElementById('memo-popup');
  document.getElementById('memo-text').innerText=text;
  popup.style.display='block';
}

function transitionToNextRoom(){
  if(isTransitioning) return;
  isTransitioning=true;
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;opacity:0;z-index:50;pointer-events:none;transition:opacity 0.4s';
  document.body.appendChild(overlay);
  requestAnimationFrame(()=>{overlay.style.opacity='1';});
  setTimeout(()=>{
    loadNextRoom();
    overlay.style.opacity='0';
    setTimeout(()=>{document.body.removeChild(overlay);isTransitioning=false;},500);
  },450);
}

function loadNextRoom(){
  if(currentRoomGroup){
    scene.remove(currentRoomGroup);
  }
  creatures=[];
  interactables=[];
  currentDoors=[];
  shootBeams.forEach(b=>scene.remove(b)); shootBeams.length=0;
  roomCount++;
  document.getElementById('room-num').textContent=String(roomCount).padStart(3,'0');
  const {grp,doors}=buildRoom();
  currentRoomGroup=grp;
  scene.add(grp);
  currentDoors=doors.map(d=>({pos:d.pos.clone(),rot:d.rot}));
  const spawnDoor=doors[0];
  const spawnRot=spawnDoor?spawnDoor.rot+Math.PI:0;
  const spawnOff=spawnDoor?1.2:0;
  camera.position.set(
    spawnDoor?spawnDoor.pos.x+Math.sin(spawnRot)*spawnOff:0,
    playerHeight,
    spawnDoor?spawnDoor.pos.z+Math.cos(spawnRot)*spawnOff:0
  );
  yaw=spawnDoor?spawnRot:0;
  pitch=0;
  camera.rotation.order='YXZ';
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;
}

// ── Controls ──────────────────────────────────────

document.addEventListener('keydown',e=>{keys[e.code]=true;});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='KeyF') shootBeam();
});

canvas.addEventListener('click',()=>{
  if(!isMobile) canvas.requestPointerLock();
});

document.addEventListener('pointerlockchange',()=>{
  isPointerLocked=document.pointerLockElement===canvas;
});

document.addEventListener('mousemove',e=>{
  if(!isPointerLocked) return;
  yaw-=e.movementX*0.0022;
  pitch-=e.movementY*0.0022;
  pitch=Math.max(-Math.PI/2.2,Math.min(Math.PI/2.2,pitch));
});

let lastTap=0;
canvas.addEventListener('touchend',e=>{
  const now=Date.now();
  if(now-lastTap<280){shootBeam();}
  lastTap=now;
},{passive:true});

if(isMobile){
  ['vjoy-left','vjoy-right'].forEach(id=>{
    document.getElementById(id).style.display='block';
  });
}

function setupVJoy(el,side){
  const knob=el.querySelector('.vjoy-knob');
  const R=50;
  el.addEventListener('touchstart',e=>{
    const t=e.changedTouches[0];
    vjoy[side].active=true; vjoy[side].id=t.identifier;
    vjoy[side].startX=t.clientX; vjoy[side].startY=t.clientY;
    e.preventDefault();
  },{passive:false});
  el.addEventListener('touchmove',e=>{
    for(const t of e.changedTouches){
      if(t.identifier!==vjoy[side].id) continue;
      let dx=t.clientX-vjoy[side].startX;
      let dy=t.clientY-vjoy[side].startY;
      const len=Math.sqrt(dx*dx+dy*dy);
      if(len>R){dx=dx/len*R;dy=dy/len*R;}
      vjoy[side].dx=dx/R; vjoy[side].dy=dy/R;
      knob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
    }
    e.preventDefault();
  },{passive:false});
  el.addEventListener('touchend',e=>{
    for(const t of e.changedTouches){
      if(t.identifier!==vjoy[side].id) continue;
      vjoy[side].active=false; vjoy[side].dx=0; vjoy[side].dy=0;
      knob.style.transform='translate(-50%,-50%)';
    }
  },{passive:true});
}

setupVJoy(document.getElementById('vjoy-left'),'left');
setupVJoy(document.getElementById('vjoy-right'),'right');

document.getElementById('next-room-btn').addEventListener('click',transitionToNextRoom);

document.getElementById('shoot-btn').addEventListener('click',e=>{
  e.preventDefault(); shootBeam();
});

document.querySelector('#memo-popup .close-btn').addEventListener('click',()=>{
  document.getElementById('memo-popup').style.display='none';
});

// ── Render Loop ───────────────────────────────────

function updateMovement(delta){
  const SPEED=isMobile?5.5:6.5;
  const dir=new THREE.Vector3();
  let moved=false;
|   if(keys['KeyW']||keys['ArrowUp']){dir.z-=1;moved=true;} |
|   if(keys['KeyS']||keys['ArrowDown']){dir.z+=1;moved=true;} |
|   if(keys['KeyA']||keys['ArrowLeft']){dir.x-=1;moved=true;} |
|   if(keys['KeyD']||keys['ArrowRight']){dir.x+=1;moved=true;} |
  if(isMobile&&vjoy.left.active){
    dir.x+=vjoy.left.dx; dir.z+=vjoy.left.dy; if(Math.abs(vjoy.left.dx)>0.05||Math.abs(vjoy.left.dy)>0.05) moved=true;
  }
  if(isMobile&&vjoy.right.active){
    yaw-=vjoy.right.dx*delta*2.5;
    pitch-=vjoy.right.dy*delta*2.5;
    pitch=Math.max(-Math.PI/2.2,Math.min(Math.PI/2.2,pitch));
  }
  if(moved&&dir.lengthSq()>0){
    dir.normalize();
    const fwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
    const right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
    const mv=new THREE.Vector3();
    mv.addScaledVector(fwd,-dir.z);
    mv.addScaledVector(right,dir.x);
    mv.normalize().multiplyScalar(SPEED*delta);
    const {W,D}=currentRoomDims;
    const nx=camera.position.x+mv.x;
    const nz=camera.position.z+mv.z;
    const margin=0.45;
    if(Math.abs(nx)<W/2-margin) camera.position.x=nx;
    if(Math.abs(nz)<D/2-margin) camera.position.z=nz;
  }
  camera.rotation.order='YXZ';
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;
}

let lastInteract=0;
let frameCount=0;

function animate(){
  requestAnimationFrame(animate);
  const delta=Math.min(clock.getDelta(),0.05);
  const elapsed=clock.elapsedTime;

  updateMovement(delta);
  updateCreatures(delta,elapsed);

  frameCount++;
  if(frameCount%4===0) checkDoors();
  if(frameCount%8===0 && Date.now()-lastInteract>1500){
    checkInteractables(); lastInteract=Date.now();
  }

  // animate spinnable/bobbing objects
  if(currentRoomGroup){
    currentRoomGroup.traverse(obj=>{
      if(obj.userData.spin){
        if(obj.userData.spinY) obj.rotation.y+=obj.userData.spinY;
        if(obj.userData.spinX) obj.rotation.x+=obj.userData.spinX;
      }
    });
  }

  checkBeams(delta);
  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ── Start ─────────────────────────────────────────

document.getElementById('loading').style.display='none';
loadNextRoom();
animate();

} // end startApp
</script>
