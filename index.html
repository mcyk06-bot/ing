<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden}
canvas{display:block;cursor:crosshair}
canvas.locked{cursor:none}

/* mobile stick */
#stick-zone{
  display:none;
  position:fixed;bottom:0;left:0;
  width:50vw;height:220px;z-index:100;
  touch-action:none
}
#stick-ring{
  position:absolute;bottom:48px;left:48px;
  width:108px;height:108px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(0,0,0,0.35)
}
#stick-knob{
  position:absolute;top:50%;left:50%;
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.35);
  transform:translate(-50%,-50%);
  transition:none;pointer-events:none
}
#look-right{
  display:none;
  position:fixed;top:0;right:0;
  width:50vw;height:100vh;z-index:90;
  touch-action:none
}

/* pc hint */
#pc-hint{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  color:rgba(255,255,255,0.35);font-size:11px;
  letter-spacing:0.5em;z-index:200;
  pointer-events:none;
  font-family:'Helvetica Neue',sans-serif;
  transition:opacity 1s
}
#pc-hint.hidden{opacity:0}

#room-info{
  position:fixed;top:28px;left:50%;
  transform:translateX(-50%);
  color:rgba(255,255,255,0.2);font-size:10px;
  letter-spacing:0.5em;z-index:100;
  pointer-events:none;
  font-family:'Helvetica Neue',sans-serif
}
#door-hint{
  position:fixed;bottom:48px;left:50%;
  transform:translateX(-50%);
  color:rgba(255,255,255,0.55);font-size:10px;
  letter-spacing:0.4em;opacity:0;
  transition:opacity 0.6s;z-index:100;
  pointer-events:none;
  font-family:'Helvetica Neue',sans-serif
}
#door-hint.visible{opacity:1}
#loading{
  position:fixed;inset:0;background:#000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:1000;gap:24px;transition:opacity 1.4s
}
#loading.fade{opacity:0;pointer-events:none}
#loading-text{
  color:rgba(255,255,255,0.3);font-size:10px;
  letter-spacing:0.6em;
  font-family:'Helvetica Neue',sans-serif
}
#progress-bar{
  width:180px;height:1px;
  background:rgba(255,255,255,0.08)
}
#progress-fill{
  height:100%;width:0%;
  background:rgba(255,255,255,0.4);
  transition:width 0.3s
}
#fade{
  position:fixed;inset:0;
  background:#000;opacity:0;
  pointer-events:none;z-index:500;
  transition:opacity 0.35s ease
}
</style>
</head>
<body>
<div id="loading">
  <div id="loading-text">LOADING</div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>
<canvas id="canvas"></canvas>
<div id="room-info">ROOM 001</div>
<div id="door-hint">— EXIT —</div>
<div id="pc-hint">CLICK TO ENTER</div>
<div id="stick-zone"><div id="stick-ring"><div id="stick-knob"></div></div></div>
<div id="look-right"></div>
<div id="fade"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
/* globals THREE */

/* ----------------------------------------------------------
   DOM refs
---------------------------------------------------------- */
var loadingEl  = document.getElementById('loading');
var progressEl = document.getElementById('progress-fill');
var roomInfoEl = document.getElementById('room-info');
var doorHintEl = document.getElementById('door-hint');

function setProgress(v) {
  progressEl.style.width = Math.min(100, v) + '%';
}

/* ----------------------------------------------------------
   Renderer
---------------------------------------------------------- */
var canvas   = document.getElementById('canvas');
var renderer = new THREE.WebGLRenderer({
  canvas: canvas,
  antialias: true,
  powerPreference: 'high-performance'
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled   = false;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 2.1;
renderer.outputEncoding      = THREE.sRGBEncoding;

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog        = new THREE.Fog(0x000000, 12, 90);

var camera = new THREE.PerspectiveCamera(
  72, window.innerWidth / window.innerHeight, 0.05, 200
);
camera.position.set(0, 1.72, 0);

window.addEventListener('resize', function () {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ----------------------------------------------------------
   RNG
---------------------------------------------------------- */
function makeRng(seed) {
  var s = seed % 2147483647;
  if (s <= 0) { s += 2147483646; }
  return function () {
    s = s * 16807 % 2147483647;
    return (s - 1) / 2147483646;
  };
}

/* ----------------------------------------------------------
   Texture builders
---------------------------------------------------------- */
function makeWallTex(r, g, b) {
  var S  = 1024;
  var cv = document.createElement('canvas');
  cv.width = cv.height = S;
  var cx = cv.getContext('2d');
  cx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
  cx.fillRect(0, 0, S, S);
  var i, d, sz;
  for (i = 0; i < 22000; i++) {
    d  = (Math.random() - 0.5) * 32;
    sz = Math.random() * 2.2 + 0.3;
    cx.fillStyle = 'rgba('
      + Math.floor(Math.min(255, Math.max(0, r + d))) + ','
      + Math.floor(Math.min(255, Math.max(0, g + d))) + ','
      + Math.floor(Math.min(255, Math.max(0, b + d))) + ','
      + (0.04 + Math.random() * 0.08) + ')';
    cx.fillRect(Math.random() * S, Math.random() * S, sz, sz);
  }
  for (i = 0; i < 60; i++) {
    var y = Math.random() * S;
    cx.strokeStyle = 'rgba('
      + (r - 18) + ',' + (g - 18) + ',' + (b - 18) + ','
      + (0.03 + Math.random() * 0.05) + ')';
    cx.lineWidth = Math.random() * 1.2 + 0.3;
    cx.beginPath();
    cx.moveTo(0, y);
    cx.lineTo(S, y + Math.random() * 8 - 4);
    cx.stroke();
  }

  var style = Math.floor(Math.random() * 4);
  if (style === 1) { 
    cx.fillStyle = 'rgba(255,255,255,0.06)';
    for(var j=0; j<40; j++) {
      cx.beginPath();
      cx.arc(Math.random()*S, Math.random()*S, 40+Math.random()*120, 0, Math.PI*2);
      cx.fill();
    }
  } else if (style === 2) { 
    cx.fillStyle = 'rgba(0,0,0,0.04)';
    for(var j=0; j<15000; j++) { cx.fillRect(Math.random()*S, Math.random()*S, 1, 1); }
    cx.strokeStyle = 'rgba(0,0,0,0.1)'; cx.lineWidth = 0.8;
    for(var j=0; j<8; j++) {
      cx.beginPath(); cx.moveTo(Math.random()*S, 0); cx.lineTo(Math.random()*S, S); cx.stroke();
    }
  } else if (style === 3) { 
    cx.fillStyle = 'rgba(255,255,255,0.05)';
    for(var j=0; j<S; j+=24) { cx.fillRect(j, 0, 12, S); }
  }

  var grad = cx.createRadialGradient(0, S, 0, 0, S, S * 0.4);
  grad.addColorStop(
    0,
    'rgba(' + (r-20) + ',' + (g-20) + ',' + (b-22) + ',0.18)'
  );
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  cx.fillStyle = grad;
  cx.fillRect(0, 0, S, S);
  var t = new THREE.CanvasTexture(cv);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}

function makeFloorTex(r, g, b) {
  var S  = 1024;
  var cv = document.createElement('canvas');
  cv.width = cv.height = S;
  var cx = cv.getContext('2d');
  cx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
  cx.fillRect(0, 0, S, S);
  var TS = 256;
  var x, y, v;
  cx.strokeStyle
    = 'rgba(' + (r-55) + ',' + (g-55) + ',' + (b-55) + ',0.55)';
  cx.lineWidth = 2.5;

  var style = Math.floor(Math.random() * 3);
  if (style === 0 || style === 2) { 
    for (x = 0; x <= S; x += TS) {
      cx.beginPath(); cx.moveTo(x, 0); cx.lineTo(x, S); cx.stroke();
    }
    for (y = 0; y <= S; y += TS) {
      cx.beginPath(); cx.moveTo(0, y); cx.lineTo(S, y); cx.stroke();
    }
    var tx, ty;
    for (ty = 0; ty < 4; ty++) {
      for (tx = 0; tx < 4; tx++) {
        v = (Math.random() - 0.5) * 20;
        cx.fillStyle = 'rgba('
          + Math.floor(r + v) + ',' + Math.floor(g + v) + ','
          + Math.floor(b + v) + ',0.22)';
        cx.fillRect(tx * TS + 3, ty * TS + 3, TS - 6, TS - 6);
      }
    }
  } else if (style === 1) {
    cx.fillStyle = 'rgba(0,0,0,0.03)';
    for(var j=0; j<20000; j++) { cx.fillRect(Math.random()*S, Math.random()*S, 1.5, 1.5); }
  }

  var gl = cx.createLinearGradient(0, 0, S, S);
  gl.addColorStop(0,   'rgba(255,255,255,0.06)');
  gl.addColorStop(0.5, 'rgba(255,255,255,0.0)');
  gl.addColorStop(1,   'rgba(255,255,255,0.04)');
  cx.fillStyle = gl;
  cx.fillRect(0, 0, S, S);
  var i, d, sz;
  for (i = 0; i < 8000; i++) {
    d  = (Math.random() - 0.5) * 14;
    sz = Math.random() * 1.5 + 0.2;
    cx.fillStyle = 'rgba('
      + Math.floor(r+d) + ',' + Math.floor(g+d) + ','
      + Math.floor(b+d) + ',0.06)';
    cx.fillRect(Math.random() * S, Math.random() * S, sz, sz);
  }
  var t = new THREE.CanvasTexture(cv);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}

function makeCeilTex(r, g, b) {
  var S  = 512;
  var cv = document.createElement('canvas');
  cv.width = cv.height = S;
  var cx = cv.getContext('2d');
  cx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
  cx.fillRect(0, 0, S, S);
  var i, d;
  for (i = 0; i < 10000; i++) {
    d = (Math.random() - 0.5) * 18;
    cx.fillStyle = 'rgba('
      + Math.floor(r + d) + ',' + Math.floor(g + d) + ','
      + Math.floor(b + d) + ',0.04)';
    cx.fillRect(
      Math.random() * S, Math.random() * S,
      Math.random() * 1.8, Math.random() * 1.8
    );
  }

  if (Math.random() > 0.5) { 
    cx.fillStyle = 'rgba(0,0,0,0.04)';
    for(var j=0; j<S; j+=32) { cx.fillRect(0, j, S, 2); }
  }

  var t = new THREE.CanvasTexture(cv);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}

function rrect(cx, x, y, w, h, r) {
  cx.beginPath();
  cx.moveTo(x + r, y);
  cx.lineTo(x + w - r, y);
  cx.arcTo(x + w, y,     x + w, y + r,     r);
  cx.lineTo(x + w, y + h - r);
  cx.arcTo(x + w, y + h, x + w - r, y + h, r);
  cx.lineTo(x + r, y + h);
  cx.arcTo(x, y + h,     x, y + h - r,     r);
  cx.lineTo(x, y + r);
  cx.arcTo(x, y,         x + r, y,         r);
  cx.closePath();
}

function makeOutletTex() {
  var cv = document.createElement('canvas');
  cv.width = cv.height = 128;
  var cx = cv.getContext('2d');
  cx.fillStyle = '#e2ddd6'; cx.fillRect(0, 0, 128, 128);
  cx.strokeStyle = '#b8b2aa'; cx.lineWidth = 2;
  cx.strokeRect(5, 5, 118, 118);
  cx.strokeStyle = '#a8a29a'; cx.lineWidth = 1.2;
  rrect(cx, 13, 13, 102, 102, 7); cx.stroke();
  cx.fillStyle = '#1e1a16';
  cx.fillRect(40, 25, 9, 20);
  cx.fillRect(79, 25, 9, 20);
  cx.beginPath(); cx.arc(64, 74, 9, 0, Math.PI * 2); cx.fill();
  cx.fillStyle = '#8a857e';
  [[22,22],[106,22],[22,106],[106,106]].forEach(function (p) {
    cx.beginPath(); cx.arc(p[0], p[1], 5, 0, Math.PI * 2); cx.fill();
    cx.strokeStyle = '#6a6560'; cx.lineWidth = 1;
    cx.beginPath();
    cx.moveTo(p[0]-4,p[1]); cx.lineTo(p[0]+4,p[1]); cx.stroke();
    cx.beginPath();
    cx.moveTo(p[0],p[1]-4); cx.lineTo(p[0],p[1]+4); cx.stroke();
  });
  return new THREE.CanvasTexture(cv);
}

function makeSwitchTex(n) {
  n = n || 1;
  var W2 = 72 + n * 48;
  var H2 = 114;
  var cv = document.createElement('canvas');
  cv.width = W2; cv.height = H2;
  var cx = cv.getContext('2d');
  cx.fillStyle = '#e4e0d8'; cx.fillRect(0, 0, W2, H2);
  cx.strokeStyle = '#c0bab0'; cx.lineWidth = 1.8;
  cx.strokeRect(4, 4, W2 - 8, H2 - 8);
  var i, sx, isOn;
  for (i = 0; i < n; i++) {
    sx   = 36 + i * 48;
    isOn = Math.random() > 0.4;
    cx.fillStyle = '#d0ccc4';
    rrect(cx, sx-14, 24, 28, 66, 5); cx.fill();
    cx.strokeStyle = '#aca8a0'; cx.lineWidth = 1.2;
    rrect(cx, sx-14, 24, 28, 66, 5); cx.stroke();
    cx.fillStyle = isOn ? '#eeeae4' : '#b8b4ae';
    rrect(cx, sx-10, isOn ? 28 : 52, 20, 24, 3); cx.fill();
    if (isOn) {
      cx.fillStyle = 'rgba(60,190,60,0.88)';
      cx.beginPath();
      cx.arc(sx, 78, 4, 0, Math.PI * 2); cx.fill();
    }
  }
  cx.fillStyle = '#9a958e';
  [[14,14],[W2-14,14],[14,H2-14],[W2-14,H2-14]].forEach(
    function (p) {
      cx.beginPath();
      cx.arc(p[0], p[1], 4.5, 0, Math.PI * 2); cx.fill();
      cx.strokeStyle = '#6a6560'; cx.lineWidth = 1;
      cx.beginPath();
      cx.moveTo(p[0]-4,p[1]); cx.lineTo(p[0]+4,p[1]); cx.stroke();
      cx.beginPath();
      cx.moveTo(p[0],p[1]-4); cx.lineTo(p[0],p[1]+4); cx.stroke();
    }
  );
  return new THREE.CanvasTexture(cv);
}

function makeExitTex() {
  var cv = document.createElement('canvas');
  cv.width = 256; cv.height = 96;
  var cx = cv.getContext('2d');
  cx.fillStyle = '#162216'; cx.fillRect(0, 0, 256, 96);
  cx.strokeStyle = 'rgba(70,210,70,0.85)'; cx.lineWidth = 2.5;
  cx.strokeRect(3, 3, 250, 90);
  cx.fillStyle = 'rgba(70,210,70,0.95)';
  cx.beginPath();
  cx.moveTo(28,48); cx.lineTo(56,32); cx.lineTo(56,43);
  cx.lineTo(76,43); cx.lineTo(76,53); cx.lineTo(56,53);
  cx.lineTo(56,64); cx.closePath(); cx.fill();
  cx.font         = 'bold 36px Arial';
  cx.fillStyle    = 'rgba(70,210,70,0.98)';
  cx.textAlign    = 'center';
  cx.textBaseline = 'middle';
  cx.fillText('EXIT', 160, 50);
  return new THREE.CanvasTexture(cv);
}

function makeEmergTex() {
  var cv = document.createElement('canvas');
  cv.width = 128; cv.height = 64;
  var cx = cv.getContext('2d');
  cx.fillStyle = '#1a1a18'; cx.fillRect(0, 0, 128, 64);
  cx.fillStyle = '#dedad2';
  rrect(cx, 7, 7, 114, 50, 5); cx.fill();
  cx.strokeStyle = '#b8b2a8'; cx.lineWidth = 1.2;
  rrect(cx, 7, 7, 114, 50, 5); cx.stroke();
  [[34,32],[94,32]].forEach(function (c) {
    var grd = cx.createRadialGradient(c[0],c[1],1,c[0],c[1],13);
    grd.addColorStop(0,   'rgba(255,245,180,1)');
    grd.addColorStop(0.5, 'rgba(255,200,60,0.55)');
    grd.addColorStop(1,   'rgba(0,0,0,0)');
    cx.fillStyle = grd;
    cx.beginPath();
    cx.arc(c[0], c[1], 13, 0, Math.PI * 2); cx.fill();
  });
  return new THREE.CanvasTexture(cv);
}

/* ----------------------------------------------------------
   Helpers
---------------------------------------------------------- */
function matStd(col, rough, metal, opts) {
  var o = Object.assign(
    { color: col, roughness: rough, metalness: metal },
    opts || {}
  );
  return new THREE.MeshStandardMaterial(o);
}

function mkMesh(geo, mat) {
  var m = new THREE.Mesh(geo, mat);
  m.castShadow    = true;
  m.receiveShadow = true;
  return m;
}

/* ----------------------------------------------------------
   Wall details
---------------------------------------------------------- */
function addDetails(grp, axis, side, len, H2, hw2, hd2, R2) {
  var oMat = new THREE.MeshStandardMaterial({
    map: makeOutletTex(), roughness: 0.75, metalness: 0.07
  });
  var sMat = new THREE.MeshStandardMaterial({
    map: makeSwitchTex(1 + Math.floor(R2() * 2)),
    roughness: 0.72, metalness: 0.06
  });
  var eMat = new THREE.MeshStandardMaterial({
    map: makeEmergTex(),
    roughness: 0.5, metalness: 0.15,
    emissive: new THREE.Color(0.55, 0.45, 0.08),
    emissiveIntensity: 0.5
  });
  var rotY = axis === 0
    ? (side > 0 ? 0 : Math.PI)
    : (side > 0 ? -Math.PI / 2 : Math.PI / 2);
  var wallZ = axis === 0 ? side * hd2 : side * hw2;
  var i, cp;
  var oc = 3 + Math.floor(R2() * 3);
  for (i = 0; i < oc; i++) {
    cp = -len / 2 + len / (oc + 1) * (i + 1);
    var om = mkMesh(
      new THREE.PlaneGeometry(0.14, 0.14), oMat
    );
    if (axis === 0) {
      om.position.set(cp, 0.32, wallZ);
    } else {
      om.position.set(wallZ, 0.32, cp);
    }
    om.rotation.y = rotY;
    grp.add(om);
  }
  [-len/2 + 0.75, len/2 - 0.75].forEach(function (sp) {
    var sm = mkMesh(
      new THREE.PlaneGeometry(0.17, 0.24), sMat
    );
    if (axis === 0) {
      sm.position.set(sp, 1.1, wallZ);
    } else {
      sm.position.set(wallZ, 1.1, sp);
    }
    sm.rotation.y = rotY;
    grp.add(sm);
  });
  var em = mkMesh(
    new THREE.PlaneGeometry(0.44, 0.22), eMat
  );
  if (axis === 0) {
    em.position.set(0, H2 - 0.45, wallZ);
  } else {
    em.position.set(wallZ, H2 - 0.45, 0);
  }
  em.rotation.y = rotY;
  grp.add(em);
  var el = new THREE.PointLight(0xffe090, 0.35, 3.5, 2.2);
  if (axis === 0) {
    el.position.set(0, H2 - 0.3, side * hd2 * 0.95);
  } else {
    el.position.set(side * hw2 * 0.95, H2 - 0.3, 0);
  }
  grp.add(el);
}

/* ----------------------------------------------------------
   Exhibits & Objects
---------------------------------------------------------- */
function buildMonolith(R2, H2) {
  var g    = new THREE.Group();
  var h    = 1.8 + R2() * H2 * 0.4;
  var w    = 0.14 + R2() * 0.2;
  var d    = 0.42 + R2() * 0.5;
  var cols = [0x080806, 0xf0ece6, 0xfafafa, 0x1a1814];
  var m    = mkMesh(
    new THREE.BoxGeometry(w, h, d),
    matStd(
      cols[Math.floor(R2() * cols.length)],
      0.12 + R2() * 0.5,
      0.1  + R2() * 0.6
    )
  );
  m.position.y = h / 2;
  g.add(m);
  var shd = mkMesh(
    new THREE.CircleGeometry(Math.max(w, d) * 0.85, 16),
    new THREE.MeshStandardMaterial({
      color: 0x000000, transparent: true,
      opacity: 0.18, roughness: 1, depthWrite: false
    })
  );
  shd.rotation.x = -Math.PI / 2;
  shd.position.y = 0.005;
  g.add(shd);
  return g;
}

function buildSphere(R2) {
  var g    = new THREE.Group();
  var r    = 0.55 + R2() * 1.8;
  var cols = [0xd8d4cc, 0xfcf8f4, 0x0a0a08, 0xe8d4b8];
  var s    = mkMesh(
    new THREE.SphereGeometry(r, 36, 24),
    matStd(
      cols[Math.floor(R2() * cols.length)],
      0.08 + R2() * 0.7,
      R2() * 0.6
    )
  );
  s.position.y = r;
  g.add(s);
  var shd = mkMesh(
    new THREE.CircleGeometry(r * 0.9, 20),
    new THREE.MeshStandardMaterial({
      color: 0x000000, transparent: true,
      opacity: 0.15, roughness: 1, depthWrite: false
    })
  );
  shd.rotation.x = -Math.PI / 2;
  shd.position.y = 0.005;
  g.add(shd);
  return g;
}

function buildSculpture(R2) {
  var g    = new THREE.Group();
  var mat1 = matStd(0x0c0c0a, 0.14, 0.5);
  var mat2 = matStd(0xe8ddd0, 0.86, 0.02);
  var ly   = 2 + Math.floor(R2() * 2);
  var y    = 0;
  var l, t, sz, hh, geo, part;
  for (l = 0; l < ly; l++) {
    t  = Math.floor(R2() * 3);
    sz = 0.25 + R2() * 0.35;
    hh = 0.25 + R2() * 0.7;
    if (t === 0) {
      geo = new THREE.BoxGeometry(sz, hh, sz);
    } else if (t === 1) {
      geo = new THREE.CylinderGeometry(
        sz * 0.5, sz * 0.5, hh, 12
      );
    } else {
      geo = new THREE.CylinderGeometry(
        sz * 0.45, sz * 0.1, hh, 12
      );
    }
    part = mkMesh(
      geo, l % 2 === 0 ? mat1.clone() : mat2.clone()
    );
    y += hh * 0.5;
    part.position.y = y;
    y += hh * 0.5;
    part.rotation.y = R2() * Math.PI;
    g.add(part);
  }
  var shd = mkMesh(
    new THREE.CircleGeometry(0.5, 16),
    new THREE.MeshStandardMaterial({
      color: 0x000000, transparent: true,
      opacity: 0.16, roughness: 1, depthWrite: false
    })
  );
  shd.rotation.x = -Math.PI / 2;
  shd.position.y = 0.005;
  g.add(shd);
  return g;
}

function buildCanvasArt(R2) {
  var g  = new THREE.Group();
  var cw = 1.2 + R2() * 2.6;
  var ch = 1.0 + R2() * 2.0;
  var CX = 512;
  var CY = Math.floor(512 * ch / cw);
  var cv2 = document.createElement('canvas');
  cv2.width  = CX;
  cv2.height = CY;
  var cx = cv2.getContext('2d');
  var pals = [
    [[245,240,232],[28,24,20]],
    [[240,235,226],[220,175,110]],
    [[228,232,234],[38,86,128]],
    [[240,236,232],[138,28,38]]
  ];
  var pal = pals[Math.floor(R2() * pals.length)];
  cx.fillStyle
    = 'rgb(' + pal[0][0] + ',' + pal[0][1] + ',' + pal[0][2] + ')';
  cx.fillRect(0, 0, CX, CY);
  var i, c, tp;
  for (i = 0; i < 3 + Math.floor(R2() * 7); i++) {
    c  = pal[Math.floor(R2() * pal.length)];
    tp = Math.floor(R2() * 3);
    cx.fillStyle = 'rgba('
      + c[0] + ',' + c[1] + ',' + c[2] + ','
      + (0.3 + R2() * 0.65) + ')';
    if (tp === 0) {
      cx.fillRect(
        R2() * CX * 0.6, R2() * CY * 0.6,
        16 + R2() * CX * 0.4, 4 + R2() * CY * 0.3
      );
    } else if (tp === 1) {
      cx.beginPath();
      cx.arc(
        R2() * CX, R2() * CY,
        6 + R2() * CX * 0.2, 0, Math.PI * 2
      );
      cx.fill();
    } else {
      cx.beginPath();
      cx.moveTo(R2() * CX, R2() * CY);
      cx.lineTo(R2() * CX, R2() * CY);
      cx.lineTo(R2() * CX, R2() * CY);
      cx.closePath(); cx.fill();
    }
  }
  var art = mkMesh(
    new THREE.BoxGeometry(cw, ch, 0.028),
    new THREE.MeshStandardMaterial({
      map: new THREE.CanvasTexture(cv2),
      roughness: 0.88, metalness: 0.0
    })
  );
  art.position.y = ch / 2;
  g.add(art);
  var sl = new THREE.PointLight(0xfff4e0, 1.8, 5.5, 2.0);
  sl.position.set(0, ch + 1.0, 0.5);
  g.add(sl);
  return g;
}

function buildBench(R2) {
  var g = new THREE.Group();
  var w = 1.5 + R2() * 1.5;
  var h = 0.4 + R2() * 0.2;
  var d = 0.4 + R2() * 0.2;
  var mat = matStd(0xeeeeee, 0.9, 0.1); 
  var top = mkMesh(new THREE.BoxGeometry(w, 0.05, d), mat);
  top.position.y = h;
  g.add(top);
  var leg1 = mkMesh(new THREE.BoxGeometry(0.05, h, d * 0.8), mat);
  leg1.position.set(-w/2 + 0.2, h/2, 0);
  g.add(leg1);
  var leg2 = mkMesh(new THREE.BoxGeometry(0.05, h, d * 0.8), mat);
  leg2.position.set(w/2 - 0.2, h/2, 0);
  g.add(leg2);
  return g;
}

function buildWaterFeature(R2) {
  var g = new THREE.Group();
  var w = 2.0 + R2() * 3.0;
  var d = 2.0 + R2() * 3.0;
  var base = mkMesh(new THREE.BoxGeometry(w, 0.2, d), matStd(0x333333, 0.8, 0.2));
  base.position.y = 0.1;
  g.add(base);
  var waterMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.7, roughness: 0.1, metalness: 0.8 });
  var water = new THREE.Mesh(new THREE.BoxGeometry(w - 0.1, 0.21, d - 0.1), waterMat);
  water.position.y = 0.1;
  g.add(water);
  return g;
}

function buildPlant(R2) {
  var g = new THREE.Group();
  var pot = mkMesh(new THREE.CylinderGeometry(0.2, 0.15, 0.4, 16), matStd(0xdddddd, 0.9, 0.0));
  pot.position.y = 0.2;
  g.add(pot);
  var leaves = mkMesh(new THREE.SphereGeometry(0.4 + R2() * 0.3, 8, 8), matStd(0x2d4c1e, 0.8, 0.1));
  leaves.position.y = 0.6 + R2() * 0.4;
  g.add(leaves);
  return g;
}

function buildStairs(R2, H) {
  var g = new THREE.Group();
  var steps = 10 + Math.floor(R2() * 15);
  var stepH = 0.15 + R2() * 0.05;
  var stepD = 0.25 + R2() * 0.05;
  var w = 1.0 + R2() * 1.0;
  var mat = matStd(0xdddddd, 0.8, 0.1);
  for(var i=0; i<steps; i++) {
    var step = mkMesh(new THREE.BoxGeometry(w, stepH, stepD), mat);
    step.position.set(0, i * stepH + stepH/2, -i * stepD);
    g.add(step);
  }
  return g;
}

function buildSpiralStairs(R2, H) {
  var g = new THREE.Group();
  var steps = 20 + Math.floor(R2() * 20);
  var mat = matStd(0xcccccc, 0.7, 0.2);
  var center = mkMesh(new THREE.CylinderGeometry(0.1, 0.1, steps * 0.15, 8), mat);
  center.position.y = steps * 0.15 / 2;
  g.add(center);
  for(var i=0; i<steps; i++) {
    var step = mkMesh(new THREE.BoxGeometry(1.2, 0.05, 0.3), mat);
    step.position.set(0.6, i * 0.15 + 0.025, 0);
    var pivot = new THREE.Group();
    pivot.position.y = i * 0.15;
    pivot.rotation.y = i * 0.4;
    pivot.add(step);
    g.add(pivot);
  }
  return g;
}

function buildPipes(R2, H) {
  var g = new THREE.Group();
  var h = 2.0 + R2() * (H - 2.0);
  var mat = matStd(0x888888, 0.4, 0.8);
  var pipe1 = mkMesh(new THREE.CylinderGeometry(0.08, 0.08, h, 8), mat);
  pipe1.position.y = h/2;
  g.add(pipe1);
  var w = 1.0 + R2() * 2.0;
  var pipe2 = mkMesh(new THREE.CylinderGeometry(0.08, 0.08, w, 8), mat);
  pipe2.rotation.z = Math.PI / 2;
  pipe2.position.set(w/2, h, 0);
  g.add(pipe2);
  return g;
}

function buildMegaSphere(R2, H) {
  var g = new THREE.Group();
  var r = 10 + R2() * 15;
  var mat = matStd(0x0a0a0a, 1.0, 0.0); // 光を完全に吸収する漆黒のマット質感
  var s = mkMesh(new THREE.SphereGeometry(r, 64, 32), mat);
  s.position.y = r;
  g.add(s);
  return g;
}

function buildMegaPillar(R2, H) {
  var g = new THREE.Group();
  var r = 2.5 + R2() * 5.0;
  var mat = matStd(0x1a1a1a, 1.0, 0.0); // ざらついた重いコンクリート調
  var p = mkMesh(new THREE.CylinderGeometry(r, r, H, 32), mat);
  p.position.y = H / 2;
  g.add(p);
  return g;
}

function buildMegaCube(R2, H) {
  var g = new THREE.Group();
  var sz = 12 + R2() * 20;
  var mat = matStd(0x111111, 0.95, 0.1); // 重厚で鈍い反射を持つ直方体
  var c = mkMesh(new THREE.BoxGeometry(sz, sz, sz), mat);
  c.position.y = sz / 2;
  c.rotation.y = R2() * Math.PI;
  g.add(c);
  return g;
}

/* ----------------------------------------------------------
   Room builder helpers
---------------------------------------------------------- */
function buildWallFB(grp, W, H, DOOR_W, DOOR_H, doorX, z, facingBack, matFn) {
  var rotY   = facingBack ? Math.PI : 0;
  var leftW  = W / 2 + doorX - DOOR_W / 2;
  var rightW = W / 2 - doorX - DOOR_W / 2;
  var topH   = H - DOOR_H;
  if (leftW > 0.01) {
    var m = mkMesh(new THREE.PlaneGeometry(leftW, H), matFn());
    m.rotation.y = rotY;
    m.position.set(-W / 2 + leftW / 2, H / 2, z);
    grp.add(m);
  }
  if (rightW > 0.01) {
    var m2 = mkMesh(new THREE.PlaneGeometry(rightW, H), matFn());
    m2.rotation.y = rotY;
    m2.position.set(W / 2 - rightW / 2, H / 2, z);
    grp.add(m2);
  }
  if (topH > 0.01) {
    var m3 = mkMesh(new THREE.PlaneGeometry(DOOR_W, topH), matFn());
    m3.rotation.y = rotY;
    m3.position.set(doorX, DOOR_H + topH / 2, z);
    grp.add(m3);
  }
}

function buildWallLR(grp, D, H, DOOR_W, DOOR_H, doorZ, x, isLeft, matFn) {
  var rotY   = isLeft ? Math.PI / 2 : -Math.PI / 2;
  var frontD = D / 2 + doorZ - DOOR_W / 2;
  var backD  = D / 2 - doorZ - DOOR_W / 2;
  var topH   = H - DOOR_H;
  if (frontD > 0.01) {
    var m = mkMesh(new THREE.PlaneGeometry(frontD, H), matFn());
    m.rotation.y = rotY;
    m.position.set(x, H / 2, -D / 2 + frontD / 2);
    grp.add(m);
  }
  if (backD > 0.01) {
    var m2 = mkMesh(new THREE.PlaneGeometry(backD, H), matFn());
    m2.rotation.y = rotY;
    m2.position.set(x, H / 2, D / 2 - backD / 2);
    grp.add(m2);
  }
  if (topH > 0.01) {
    var m3 = mkMesh(new THREE.PlaneGeometry(DOOR_W, topH), matFn());
    m3.rotation.y = rotY;
    m3.position.set(x, DOOR_H + topH / 2, doorZ);
    grp.add(m3);
  }
}

function addDoorGlow(grp, dx, dz, dh, rotY, color) {
  var c   = new THREE.Color(color);
  var mat = new THREE.MeshStandardMaterial({
    color: color, emissive: c, emissiveIntensity: 1.1,
    roughness: 0.4, transparent: true, opacity: 0.9, depthWrite: false
  });
  var bar = new THREE.Mesh(new THREE.PlaneGeometry(2.2, 0.055), mat);
  bar.rotation.y = rotY;
  bar.position.set(dx, dh + 0.06, dz);
  grp.add(bar);
  var pl = new THREE.PointLight(color, 1.4, 5.0, 2.2);
  pl.position.set(dx, dh - 0.6, dz);
  grp.add(pl);
}

/* ----------------------------------------------------------

---------------------------------------------------------- */
var PALETTES = [
  { wr:235,wg:228,wb:218, fr:90,fg:74,fb:58,  lc:0xffe8c0, li:2.0, ac:0xfff0d8, ai:0.18 },

  { wr:200,wg:222,wb:210, fr:40,fg:80,fb:60,  lc:0xb0ffd8, li:1.9, ac:0x90ffcc, ai:0.14 },
  { wr:238,wg:216,wb:196, fr:118,fg:60,fb:30, lc:0xff9030, li:2.3, ac:0xff7010, ai:0.17 },
  { wr:206,wg:206,wb:212, fr:170,fg:170,fb:180, lc:0xd8e4ff, li:1.7, ac:0xd0daff, ai:0.12 },

  { wr:222,wg:206,wb:230, fr:76,fg:46,fb:96,  lc:0xcc60ff, li:2.1, ac:0xbb40ff, ai:0.12 },
  { wr:196,wg:226,wb:230, fr:36,fg:86,fb:100, lc:0x30ddff, li:2.0, ac:0x10ccff, ai:0.14 },
  { wr:230,wg:216,wb:192, fr:106,fg:86,fb:60, lc:0xffc870, li:1.9, ac:0xffb850, ai:0.15 },
  { wr:10, wg:16, wb:20,  fr:20,fg:30,fb:36,  lc:0x20e8ff, li:2.3, ac:0x10ccee, ai:0.09 },
  { wr:245,wg:245,wb:245, fr:220,fg:220,fb:220, lc:0xffffff, li:2.1, ac:0xffffff, ai:0.25 },
  { wr:230,wg:232,wb:230, fr:150,fg:150,fb:150, lc:0xddddff, li:2.2, ac:0xeeeeff, ai:0.18 },
  { wr:250,wg:245,wb:240, fr:200,fg:180,fb:160, lc:0xffeedd, li:2.0, ac:0xffeedd, ai:0.22 }
];

function buildRoom(seed) {
  var R2  = makeRng(seed);
  
  // --- 新規追加: メガ・ルーム（巨大空間）の判定とサイズ変更 ---
  var isMega = R2() > 0.75; // 25%の確率でメガ・ルーム
  var W   = isMega ? 60 + R2() * 120 : 16 + R2() * 36;
  var D   = isMega ? 80 + R2() * 140 : 22 + R2() * 62;
  var H   = isMega ? 30 + R2() * 50  : 5  + R2() * 9;
  var fogNear = isMega ? 20 + R2() * 20 : 12; // 柔らかい空気感を演出する動的フォグ
  var fogFar  = isMega ? D * 0.8 + 40   : 90;
  // ------------------------------------------------------------
  
  var hw  = W / 2, hd = D / 2;
  var DOOR_W = 2.1 + R2() * 0.7;
  var DOOR_H = 2.5 + R2() * 0.6;
  var pal = PALETTES[Math.floor(R2() * PALETTES.length)];
  var grp = new THREE.Group();

  /* textures */
  var wallTex  = makeWallTex(pal.wr, pal.wg, pal.wb);
  wallTex.repeat.set(W / 4, H / 4);
  var floorTex = makeFloorTex(pal.fr, pal.fg, pal.fb);
  floorTex.repeat.set(W / 4, D / 4);
  var ceilTex  = makeCeilTex(
    Math.max(pal.wr - 14, 0), Math.max(pal.wg - 14, 0), Math.max(pal.wb - 14, 0));
  ceilTex.repeat.set(W / 4, D / 4);

  function wallMat() {
    return new THREE.MeshStandardMaterial({ map: wallTex, roughness: 0.84, metalness: 0.0 });
  }

  /* floor & ceiling */
  var floor = mkMesh(new THREE.PlaneGeometry(W, D),
    new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.74, metalness: 0.04 }));
  floor.rotation.x = -Math.PI / 2;
  grp.add(floor);

  var ceil = mkMesh(new THREE.PlaneGeometry(W, D),
    new THREE.MeshStandardMaterial({ map: ceilTex, roughness: 0.90, metalness: 0.0 }));
  ceil.rotation.x = Math.PI / 2;
  ceil.position.y = H;
  grp.add(ceil);

  /* ---- which walls get doors ---- */
  var numDoors   = 1 + Math.floor(R2() * 3);
  var extraWalls = ['back', 'left', 'right'];
  for (var si = extraWalls.length - 1; si > 0; si--) {
    var sj = Math.floor(R2() * (si + 1));
    var st = extraWalls[si]; extraWalls[si] = extraWalls[sj]; extraWalls[sj] = st;
  }
  var activeExtra  = extraWalls.slice(0, numDoors - 1);
  var hasDoorBack  = activeExtra.indexOf('back')  >= 0;
  var hasDoorLeft  = activeExtra.indexOf('left')  >= 0;
  var hasDoorRight = activeExtra.indexOf('right') >= 0;

  var maxXOff = Math.max(0, (W - DOOR_W) / 2 - 1.4);
  var maxZOff = Math.max(0, (D - DOOR_W) / 2 - 1.4);
  var frontDX = (R2() * 2 - 1) * maxXOff;
  var backDX  = (R2() * 2 - 1) * maxXOff;
  var leftDZ  = (R2() * 2 - 1) * maxZOff;
  var rightDZ = (R2() * 2 - 1) * maxZOff;

  /* ---- walls with door cutouts ---- */
  buildWallFB(grp, W, H, DOOR_W, DOOR_H, frontDX, -hd, false, wallMat);

  if (hasDoorBack) {
    buildWallFB(grp, W, H, DOOR_W, DOOR_H, backDX, hd, true, wallMat);
  } else {
    var wb = mkMesh(new THREE.PlaneGeometry(W, H), wallMat());
    wb.rotation.y = Math.PI; wb.position.set(0, H / 2, hd); grp.add(wb);
  }
  if (hasDoorLeft) {
    buildWallLR(grp, D, H, DOOR_W, DOOR_H, leftDZ, -hw, true, wallMat);
  } else {
    var wl = mkMesh(new THREE.PlaneGeometry(D, H), wallMat());
    wl.rotation.y = Math.PI / 2; wl.position.set(-hw, H / 2, 0); grp.add(wl);
  }
  if (hasDoorRight) {
    buildWallLR(grp, D, H, DOOR_W, DOOR_H, rightDZ, hw, false, wallMat);
  } else {
    var wr2 = mkMesh(new THREE.PlaneGeometry(D, H), wallMat());
    wr2.rotation.y = -Math.PI / 2; wr2.position.set(hw, H / 2, 0); grp.add(wr2);
  }

  /* ---- skirting & cornice ---- */
  var skC = new THREE.Color(pal.wr / 255 * 0.82, pal.wg / 255 * 0.82, pal.wb / 255 * 0.82);
  var skMat = new THREE.MeshStandardMaterial({ color: skC, roughness: 0.80, metalness: 0.02 });
  var skH = 0.11, skT = 0.045;
  [
    [new THREE.BoxGeometry(W, skH, skT), 0,   skH / 2,   -hd],
    [new THREE.BoxGeometry(W, skH, skT), 0,   skH / 2,    hd],
    [new THREE.BoxGeometry(skT, skH, D), -hw, skH / 2,   0  ],
    [new THREE.BoxGeometry(skT, skH, D),  hw, skH / 2,   0  ],
    [new THREE.BoxGeometry(W, 0.05, skT), 0,  H - 0.025, -hd],
    [new THREE.BoxGeometry(W, 0.05, skT), 0,  H - 0.025,  hd],
    [new THREE.BoxGeometry(skT, 0.05, D),-hw, H - 0.025, 0  ],
    [new THREE.BoxGeometry(skT, 0.05, D), hw, H - 0.025, 0  ],
  ].forEach(function (s) {
    var m = mkMesh(s[0], skMat.clone());
    m.position.set(s[1], s[2], s[3]); grp.add(m);
  });

  /* ---- wall details ---- */
  addDetails(grp, 0,  1, W, H, hw, hd, R2);
  addDetails(grp, 0, -1, W, H, hw, hd, R2);
  addDetails(grp, 1,  1, D, H, hw, hd, R2);
  addDetails(grp, 1, -1, D, H, hw, hd, R2);

  /* ---- door glows ---- */
  addDoorGlow(grp, frontDX, -hd + 0.02, DOOR_H, 0,             pal.lc);
  if (hasDoorBack)  addDoorGlow(grp, backDX,   hd - 0.02,  DOOR_H, Math.PI,       pal.lc);
  if (hasDoorLeft)  addDoorGlow(grp, leftDZ,  -hw + 0.02,  DOOR_H, Math.PI / 2,   pal.lc);
  if (hasDoorRight) addDoorGlow(grp, rightDZ,  hw - 0.02,  DOOR_H, -Math.PI / 2,  pal.lc);

  /* ---- lighting ---- */
  var amb = new THREE.AmbientLight(pal.ac, pal.ai);
  grp.add(amb);
  var rows = Math.min(Math.ceil(D / 8), 2);
  var cols = Math.min(Math.ceil(W / 8), 2);
  for (var ri = 0; ri < rows; ri++) {
    for (var ci = 0; ci < cols; ci++) {
      var lx = -hw + (W / cols) * (ci + 0.5);
      var lz = -hd + (D / rows) * (ri + 0.5);
      var sl = new THREE.SpotLight(pal.lc, pal.li, H * 2.5, Math.PI / 5.5, 0.42, 1.5);
      sl.position.set(lx, H - 0.1, lz);
      sl.target.position.set(lx, 0, lz);
      grp.add(sl); grp.add(sl.target);
    }
  }

  /* ---- exhibits (一部変更: メガ・ルーム用オブジェクトの分岐追加) ---- */
  var exCount = isMega ? (1 + Math.floor(R2() * 3)) : (3 + Math.floor(R2() * 9));
  for (var ei = 0; ei < exCount; ei++) {
    var exGrp;
    if (isMega) {
      // 巨大空間専用の圧倒的なオブジェクト
      var mType = Math.floor(R2() * 3);
      if      (mType === 0) exGrp = buildMegaSphere(R2, H);
      else if (mType === 1) exGrp = buildMegaPillar(R2, H);
      else                  exGrp = buildMegaCube(R2, H);
    } else {
      // 通常のインテリアと展示物
      var eType = Math.floor(R2() * 10);
      if      (eType === 0) exGrp = buildMonolith(R2, H);
      else if (eType === 1) exGrp = buildSphere(R2);
      else if (eType === 2) exGrp = buildSculpture(R2);
      else if (eType === 3) exGrp = buildCanvasArt(R2);
      else if (eType === 4) exGrp = buildBench(R2);
      else if (eType === 5) exGrp = buildWaterFeature(R2);
      else if (eType === 6) exGrp = buildPlant(R2);
      else if (eType === 7) exGrp = buildStairs(R2, H);
      else if (eType === 8) exGrp = buildSpiralStairs(R2, H);
      else                  exGrp = buildPipes(R2, H);
    }
    
    // オブジェクトが巨大化しても壁にめり込まないよう、余裕を持たせる
    var marginW = isMega ? 20 : 4;
    var marginD = isMega ? 20 : 6;
    exGrp.position.set(
      (R2() - 0.5) * Math.max(0, W - marginW),
      0,
      (R2() - 0.5) * Math.max(0, D - marginD)
    );
    exGrp.rotation.y = R2() * Math.PI * 2;
    grp.add(exGrp);
  }

  /* ---- door trigger data (room-local coords) ---- */
  var doors = [
    { wall: 'front', dx: frontDX, dz: 0,      seed: Math.floor(R2() * 99991) + 1 }
  ];
  if (hasDoorBack)
    doors.push({ wall: 'back',  dx: backDX,  dz: 0,      seed: Math.floor(R2() * 99991) + 1 });
  if (hasDoorLeft)
    doors.push({ wall: 'left',  dx: 0,       dz: leftDZ, seed: Math.floor(R2() * 99991) + 1 });
  if (hasDoorRight)
    doors.push({ wall: 'right', dx: 0,       dz: rightDZ, seed: Math.floor(R2() * 99991) + 1 });

  return { group: grp, W: W, D: D, H: H, hw: hw, hd: hd,
           DOOR_W: DOOR_W, DOOR_H: DOOR_H, doors: doors,
           fogNear: fogNear, fogFar: fogFar }; // 動的フォグのパラメータを返す
}

/* ----------------------------------------------------------
   Camera / movement
---------------------------------------------------------- */
var yaw       = 0;
var pitch     = 0;
var walkPhase = 0;
var SPEED     = 0.052;

/* ----------------------------------------------------------
   Room & transition state
---------------------------------------------------------- */
var currentRoom   = null;
var roomNum       = 1;
var transitioning = false;
var fadeEl        = document.getElementById('fade');

function spawnRoom(seed) {
  var r = buildRoom(seed);
  r.group.position.set(0, 0, 0);
  scene.add(r.group);
  return r;
}

function enterDoor(door) {
  if (transitioning) return;
  transitioning = true;
  fadeEl.style.transition = 'opacity 0.35s ease';
  fadeEl.style.opacity    = '1';

  setTimeout(function () {
    scene.remove(currentRoom.group);
    currentRoom = spawnRoom(door.seed);

    // --- 新規追加: 部屋のサイズに合わせてフォグ（空気感）を動的に変更 ---
    scene.fog.near = currentRoom.fogNear;
    scene.fog.far  = currentRoom.fogFar;
    // ----------------------------------------------------------------

    /* slight Y jolt — the "step through" feel */
    camera.position.set(0, 1.72 + (Math.random() - 0.5) * 0.14, currentRoom.hd - 2.5);
    walkPhase = Math.random() * Math.PI * 2;
    yaw       = 0;

    roomNum++;
    roomInfoEl.textContent = 'ROOM ' + String(roomNum).padStart(3, '0');

    setTimeout(function () {
      fadeEl.style.opacity = '0';
      setTimeout(function () { transitioning = false; }, 420);
    }, 110);
  }, 370);
}

function checkDoors() {
  if (transitioning || !currentRoom) return;
  var r   = currentRoom;
  var lx  = camera.position.x;
  var lz  = camera.position.z;
  var hw  = r.hw, hd = r.hd;
  var DW  = r.DOOR_W;
  var thr = DW / 2 + 0.28;

  for (var i = 0; i < r.doors.length; i++) {
    var d   = r.doors[i];
    var hit = false;
    if (d.wall === 'front'  && lz < -hd + 0.5 && Math.abs(lx - d.dx) < thr) hit = true;
    if (d.wall === 'back'   && lz >  hd - 0.5 && Math.abs(lx - d.dx) < thr) hit = true;
    if (d.wall === 'left'   && lx < -hw + 0.5 && Math.abs(lz - d.dz) < thr) hit = true;
    if (d.wall === 'right'  && lx >  hw - 0.5 && Math.abs(lz - d.dz) < thr) hit = true;
    if (hit) { enterDoor(d); return; }
  }
}

function checkDoorHint() {
  if (!currentRoom) return;
  var r = currentRoom;
  var lx = camera.position.x, lz = camera.position.z;
  var near = false;
  r.doors.forEach(function (d) {
    var dist = 999;
    if (d.wall === 'front') dist = lz - (-r.hd);
    else if (d.wall === 'back')  dist = r.hd - lz;
    else if (d.wall === 'left')  dist = lx - (-r.hw);
    else                         dist = r.hw - lx;
    if (dist < 4.0) near = true;
  });
  doorHintEl.classList.toggle('visible', near);
}

/* ----------------------------------------------------------
   Init scene
---------------------------------------------------------- */
setProgress(20);
currentRoom = spawnRoom(Math.floor(Math.random() * 99991) + 1);

// --- 新規追加: 初期のフォグ適用 ---
scene.fog.near = currentRoom.fogNear;
scene.fog.far  = currentRoom.fogFar;
// ----------------------------------

setProgress(80);
camera.position.set(0, 1.72, currentRoom.hd - 2.5);
camera.rotation.order = 'YXZ';

/* ----------------------------------------------------------
   Device detection
---------------------------------------------------------- */
var isMobile  = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
var stickZone = document.getElementById('stick-zone');
var lookRight = document.getElementById('look-right');
var pcHint    = document.getElementById('pc-hint');

if (isMobile) {
  stickZone.style.display = 'block';
  lookRight.style.display = 'block';
  pcHint.style.display    = 'none';
}

/* ----------------------------------------------------------
   PC: Pointer Lock + WASD
---------------------------------------------------------- */
var pointerLocked = false;
var keys = { w: false, a: false, s: false, d: false };

if (!isMobile) {
  canvas.addEventListener('click', function () { canvas.requestPointerLock(); });
  document.addEventListener('pointerlockchange', function () {
    pointerLocked = document.pointerLockElement === canvas;
    canvas.classList.toggle('locked', pointerLocked);
    if (pointerLocked) pcHint.classList.add('hidden');
    else               pcHint.classList.remove('hidden');
  });
  document.addEventListener('mousemove', function (e) {
    if (!pointerLocked) return;
    yaw   -= e.movementX * 0.0022;
    pitch  = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch - e.movementY * 0.0022));
  });
  document.addEventListener('mouseleave', function () {
    if (pointerLocked) document.exitPointerLock();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'w' || e.key === 'ArrowUp')    keys.w = true;
    if (e.key === 's' || e.key === 'ArrowDown')   keys.s = true;
    if (e.key === 'a' || e.key === 'ArrowLeft')   keys.a = true;
    if (e.key === 'd' || e.key === 'ArrowRight')  keys.d = true;
    if (e.key === 'Escape') document.exitPointerLock();
  });
  document.addEventListener('keyup', function (e) {
    if (e.key === 'w' || e.key === 'ArrowUp')    keys.w = false;
    if (e.key === 's' || e.key === 'ArrowDown')   keys.s = false;
    if (e.key === 'a' || e.key === 'ArrowLeft')   keys.a = false;
    if (e.key === 'd' || e.key === 'ArrowRight')  keys.d = false;
  });
}

/* ----------------------------------------------------------
   Mobile: Virtual stick (left) + look drag (right)
---------------------------------------------------------- */
var stickRing = document.getElementById('stick-ring');
var stickKnob = document.getElementById('stick-knob');
var joyX = 0, joyY = 0;
var stickTouchId = null, stickOriginX, stickOriginY;
var STICK_MAX = 40;

if (isMobile) {
  stickZone.addEventListener('touchstart', function (e) {
    var t = e.changedTouches[0];
    stickTouchId = t.identifier;
    stickOriginX = t.clientX; stickOriginY = t.clientY;
    var zr = stickZone.getBoundingClientRect();
    stickRing.style.left   = (t.clientX - zr.left - 54) + 'px';
    stickRing.style.bottom = (zr.bottom - t.clientY - 54) + 'px';
    stickRing.style.top    = 'auto';
    e.preventDefault();
  }, { passive: false });

  stickZone.addEventListener('touchmove', function (e) {
    for (var i = 0; i < e.changedTouches.length; i++) {
      var t = e.changedTouches[i];
      if (t.identifier !== stickTouchId) continue;
      var dx = t.clientX - stickOriginX;
      var dy = t.clientY - stickOriginY;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > STICK_MAX) { dx = dx / dist * STICK_MAX; dy = dy / dist * STICK_MAX; }
      joyX =  dx / STICK_MAX;
      joyY = -dy / STICK_MAX;
      stickKnob.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px))';
    }
    e.preventDefault();
  }, { passive: false });

  function resetStick(e) {
    for (var i = 0; i < e.changedTouches.length; i++) {
      if (e.changedTouches[i].identifier !== stickTouchId) continue;
      joyX = joyY = 0; stickTouchId = null;
      stickKnob.style.transform = 'translate(-50%, -50%)';
    }
  }
  stickZone.addEventListener('touchend',    resetStick, { passive: true });
  stickZone.addEventListener('touchcancel', resetStick, { passive: true });

  var lookTouchId = null, lookLastX, lookLastY;
  lookRight.addEventListener('touchstart', function (e) {
    var t = e.changedTouches[0];
    lookTouchId = t.identifier; lookLastX = t.clientX; lookLastY = t.clientY;
  }, { passive: true });
  lookRight.addEventListener('touchmove', function (e) {
    for (var i = 0; i < e.changedTouches.length; i++) {
      var t = e.changedTouches[i];
      if (t.identifier !== lookTouchId) continue;
      yaw   -= (t.clientX - lookLastX) * 0.005;
      pitch  = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch - (t.clientY - lookLastY) * 0.005));
      lookLastX = t.clientX; lookLastY = t.clientY;
    }
  }, { passive: true });
  lookRight.addEventListener('touchend', function (e) {
    for (var i = 0; i < e.changedTouches.length; i++) {
      if (e.changedTouches[i].identifier === lookTouchId) lookTouchId = null;
    }
  }, { passive: true });
}

/* ----------------------------------------------------------
   Render loop
---------------------------------------------------------- */
var clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  var dt = Math.min(clock.getDelta(), 0.05);

  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  var fwd = 0, str = 0;
  if (!isMobile) {
    fwd = (keys.w ? 1 : 0) - (keys.s ? 1 : 0);
    str = (keys.d ? 1 : 0) - (keys.a ? 1 : 0);
  } else {
    fwd = joyY; str = joyX;
  }

  var moving = (fwd !== 0 || str !== 0);
  if (moving) {
    camera.position.x += (-Math.sin(yaw) * fwd + Math.cos(yaw) * str) * SPEED;
    camera.position.z += (-Math.cos(yaw) * fwd - Math.sin(yaw) * str) * SPEED;
    walkPhase += dt * 7.8;
    camera.position.y = 1.72 + Math.sin(walkPhase) * 0.04;
  } else {
    walkPhase += dt * 1.8;
    camera.position.y += (1.72 + Math.sin(walkPhase) * 0.006 - camera.position.y) * 0.07;
  }

  /* wall clamp (disabled mid-transition so player can pass through) */
  if (currentRoom && !transitioning) {
    var hw2 = currentRoom.hw, hd2 = currentRoom.hd;
    camera.position.x = Math.max(-hw2 + 0.3, Math.min(hw2 - 0.3, camera.position.x));
    camera.position.z = Math.max(-hd2 + 0.3, Math.min(hd2 - 0.3, camera.position.z));
    checkDoors();
    checkDoorHint();
  }

  renderer.render(scene, camera);
}

/* loading done */
setProgress(100);
setTimeout(function () {
  loadingEl.classList.add('fade');
  setTimeout(function () { loadingEl.style.display = 'none'; }, 1500);
}, 600);

animate();
</script>
